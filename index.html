    let qEnemyVox = null;      // q_teki.vox   … 通常敵・軌跡敵・蛇行敵
    let qShooterVox = null;    // q_teki2.vox  … 弾を撃つ通常敵
    let qMidBossVox = null;    // q_boss0.vox  … 中ボス
    let qFinalBossVox = null;  // q_boss01.vox … ラスボス
    loadVoxModel("Game/vox/q_teki.vox",  (m) => { qEnemyVox = m; });
    loadVoxModel("Game/vox/q_teki2.vox", (m) => { qShooterVox = m; });
    loadVoxModel("Game/vox/q_boss0.vox", (m) => {
      m.geo.translate(0, -m.minY, 0); // 通常版と同じく底面を原点に
      qMidBossVox = m;
    });
    loadVoxModel("Game/vox/q_boss01.vox", (m) => {
      m.geo.translate(0, -m.minY, 0);
      qFinalBossVox = m;
    });

    // 自機弾・敵弾
    // 縦（高さ・進行方向の長さ）は当たり判定の半分の見た目にする（横幅はそのまま）
    const playerBulletGeo = new THREE.BoxGeometry(6, 8, 6);
    const playerBulletMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x554400, roughness: 0.3 });
    // 敵弾は見えにくいことがあるため、縦幅・奥行きの見た目を1.5倍にして視認性を上げる
    const enemyBulletGeo = new THREE.BoxGeometry(4, 10.5, 7.5);
    // 敵弾は視認性最優先。ライティングで暗くならないMeshBasicMaterialで常時フルブライト
    // 表示し、色は毎フレームupdateCyberColorsが「格子線の逆色を明るく補正した色」に更新する
    const enemyBulletMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    // ラスボス弾専用マテリアル。基本は白で目立たせ、格子線が白に近い時だけ
    // ピンクに切り替える（updateBossBulletColorが毎フレーム更新）
    const bossBulletMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    // パワーアップ★（3方向ショット／2連ショット）
    const powerStarGeo = buildStarShapeGeometry(5, 10, 4, 10);
    const powerStarMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x666622, roughness: 0.3, metalness: 0.4 });
    const doubleStarMat = new THREE.MeshStandardMaterial({ color: 0xbbeaff, emissive: 0x224466, roughness: 0.3, metalness: 0.4 });

    // 最終ボス：MagicaVoxelモデルに差し替え予定の仮プレースホルダー（単色の直方体）
    const finalBossUnitGeo = new THREE.BoxGeometry(1, 1, 1);
    finalBossUnitGeo.translate(0, 0.5, 0);
    const finalBossMat = new THREE.MeshStandardMaterial({ color: 0xff9933, roughness: 0.5, metalness: 0.25, emissive: 0x331100 });

    function createMesh3D(entity) {
      let mesh;
      if (entity === player) {
        return playerMesh;
      } else if (entity.isFinalBoss) {
        // Qモードのラスボスはq_boss01.voxに差し替え
        const fbVox = (entity.qBoss && qFinalBossVox) ? qFinalBossVox : finalBossVox;
        if (fbVox) {
          mesh = new THREE.Mesh(fbVox.geo, fbVox.mat);
          const s = entity.w / fbVox.w;
          mesh.scale.set(s, s, entity.h / fbVox.d);
          // 大きさは生成時に確定（syncBoxEntitiesの箱プレースホルダー用スケールは適用しない）
          mesh.userData.fixedScale = true;
        } else {
          mesh = new THREE.Mesh(finalBossUnitGeo, finalBossMat);
        }
        mesh.castShadow = true;
      } else if (entity.type === "hard_twin") {
        const mat = hardTwinMat.clone();
        mesh = new THREE.Mesh(hardTwinGeo, mat);
        mesh.castShadow = true;
      } else if (entity.isBoss) {
        // Qモードの中ボスはq_boss0.voxに差し替え
        const mbVox = (tunnelMode && qMidBossVox) ? qMidBossVox : midBossVox;
        if (mbVox) {
          mesh = new THREE.Mesh(mbVox.geo, mbVox.mat);
          const s = entity.w / mbVox.w;
          mesh.scale.set(s, s, entity.h / mbVox.d);
          mesh.castShadow = true;
        } else {
          mesh = midBossTemplate.clone();
        }
      } else if (entity.isMissile) {
        if (missileVox) {
          mesh = new THREE.Mesh(missileVox.geo, missileVox.mat);
          const s = entity.w / missileVox.w;
          mesh.scale.set(s, s, entity.h / missileVox.d);
        } else {
          mesh = new THREE.Mesh(missileGeo, missileMat);
        }
        mesh.castShadow = true;
      } else if (entity.w === 30 && entity.h === 30 && !entity.hasOwnProperty("size") && !entity.hasOwnProperty("vx")) {
        // 通常敵／軌跡敵／ジグザグ敵は30×30固定（MagicaVoxelモデル。読み込み前は立方体）。
        // 以前は自機サイズ(player.w/h)と比較していたが、自機の当たり判定を
        // 40×18に変えたため敵のサイズを直接指定する
        mesh = createEnemyShipMesh(entity);
      } else if (entity.hasOwnProperty("vx") && entity.h > entity.w) {
        // 弾（自機弾／敵弾は幅より高さが大きい細長い矩形）
        const isPlayerBullet = entity.vy < 0 || (entity.vy === 0 && entity.vx !== 0 && entity.w === 6);
        const bulletMat = isPlayerBullet ? playerBulletMat : (entity.boss ? bossBulletMat : enemyBulletMat);
        mesh = new THREE.Mesh(isPlayerBullet ? playerBulletGeo : enemyBulletGeo, bulletMat);
      } else if (entity.hasOwnProperty("size")) {
        // パワーアップ★
        const isDouble = doubleShotStars.includes(entity);
        if (starVox) {
          // どの星もstar.voxそのまま（色替えなし）
          mesh = new THREE.Mesh(starVox.geo, starVox.mat);
          const s = entity.w / starVox.w;
          mesh.scale.set(s, s, entity.h / starVox.d);
        } else {
          mesh = new THREE.Mesh(powerStarGeo, isDouble ? doubleStarMat : powerStarMat);
        }
        mesh.castShadow = true;
      } else {
        mesh = createEnemyShipMesh(entity);
      }
      scene.add(mesh);
      entity.mesh3d = mesh;
      return mesh;
    }

    function removeMesh3D(entity) {
      if (entity && entity.mesh3d) {
        scene.remove(entity.mesh3d);
        entity.mesh3d = null;
      }
    }

    function getOrCreateMesh(entity) {
      return entity.mesh3d || createMesh3D(entity);
    }

    function heightFor(entity) {
      if (entity.isFinalBoss) return BASE_ALT + 10;
      if (entity.type === "hard_twin") return BASE_ALT + 14;
      if (entity.isBoss) return BASE_ALT + 20;
      if (entity.isMissile) return BASE_ALT + 10;
      if (entity.hasOwnProperty("vx")) return BASE_ALT + 9;
      if (entity.hasOwnProperty("size")) return BASE_ALT + 5;
      return BASE_ALT;
    }

    function syncBoxEntities(list) {
      for (const e of list) {
        const mesh = getOrCreateMesh(e);
        if (e.isFinalBoss && !mesh.userData.fixedScale) {
          mesh.scale.set(e.w, 60, e.h);
        }
        const cx = e.x + e.w / 2;
        const cy = e.y + e.h / 2;
        mesh.position.set(toWorldX(cx), heightFor(e), toDepthZ(cy));

        if (e.type === "zigzag_enemy") {
          mesh.rotation.y = Math.max(-0.5, Math.min(0.5, -Math.sin(e.zigPhase) * 0.6));
        } else if (e.isFinalBoss) {
          mesh.rotation.y = 0;
        } else {
          mesh.rotation.y = 0;
        }

        if (e.type === "hard_twin" && mesh.material) {
          const flashT = (e.hitFlash || 0) / 6;
          mesh.material.emissive.setRGB(flashT, flashT, flashT);
        }
      }
    }

    // ===== 敵の光跡（トレイル）を3Dの発光ラインで表現 =====
    const trailLines = new Map();
    function syncTrails() {
      const live = new Set();
      for (const e of enemies) {
        if (!Array.isArray(e.trail) || e.trail.length < 2) continue;
        live.add(e);

        let line = trailLines.get(e);
        if (!line) {
          const geo = new THREE.BufferGeometry();
          const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
          line = new THREE.Line(geo, mat);
          scene.add(line);
          trailLines.set(e, line);
        }

        const n = e.trail.length;
        const positions = new Float32Array(n * 3);
        const colors = new Float32Array(n * 3);
        const base = new THREE.Color(e.trailColor || "#ffff00");
        const trailY = heightFor(e);
        for (let i = 0; i < n; i++) {
          const p = e.trail[i];
          positions[i*3]   = toWorldX(p.x);
          positions[i*3+1] = trailY;
          positions[i*3+2] = toDepthZ(p.y);
          const a = Math.max(0, Math.min(1, p.life / 240));
          colors[i*3]   = base.r * a;
          colors[i*3+1] = base.g * a;
          colors[i*3+2] = base.b * a;
        }
        line.geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        line.geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        line.geometry.attributes.position.needsUpdate = true;
        line.geometry.attributes.color.needsUpdate = true;
      }

      for (const [e, line] of trailLines) {
        if (!live.has(e)) {
          scene.remove(line);
          trailLines.delete(e);
        }
      }
    }

    function removeAllTrails() {
      for (const [, line] of trailLines) scene.remove(line);
      trailLines.clear();
    }

    // ===== 通常爆発の3D表現（膨張する半透明の光球） =====
    function ensureExplosionMesh(ex) {
      if (ex.mesh3d) return ex.mesh3d;
      const pattern = explosionPatterns[ex.patternIndex];
      const group = new THREE.Group();
      group.userData.rings = [];
      for (const ring of pattern.rings) {
        const geo = new THREE.SphereGeometry(1, 12, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: ring.color, transparent: true, opacity: ring.alpha,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        group.add(mesh);
        group.userData.rings.push({ mesh, ring });
      }
      const coreGeo = new THREE.SphereGeometry(1, 10, 8);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffee, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
      const core = new THREE.Mesh(coreGeo, coreMat);
      group.add(core);
      group.userData.core = core;

      scene.add(group);
      ex.mesh3d = group;
      return group;
    }

    function syncExplosions() {
      const live = new Set(explosions);
      for (const ex of explosions) {
        const pattern = explosionPatterns[ex.patternIndex];
        const totalLife = pattern.maxLife * 2;
        const t = ex.life / totalLife;
        const ease = Math.sqrt(t);
        const alphaBase = 1 - t;

        const group = ensureExplosionMesh(ex);
        group.position.set(toWorldX(ex.x), BASE_ALT + 6, toDepthZ(ex.y));

        for (const { mesh, ring } of group.userData.rings) {
          const radius = Math.max(0.001, ex.maxRadius * ring.r * ease);
          mesh.scale.setScalar(radius);
          mesh.material.opacity = Math.max(0, alphaBase * ring.alpha);
        }
        const core = group.userData.core;
        core.scale.setScalar(Math.max(0.001, ex.maxRadius * 0.15 * (1 - t)));
        core.material.opacity = Math.max(0, alphaBase * 0.9);
      }

      for (const child of [...scene.children]) {
        // no-op safeguard; actual cleanup handled by removeMesh3D on splice
      }
      for (const [k] of trailLines) { /* trails cleaned separately */ }
      void live;
    }

    // ===== 大ボス撃破：15重リング花火（地面に広がるリング＋中心の光） =====
    let finalBigExplosionGroup = null;

    function ensureFinalBigExplosionGroup() {
      if (finalBigExplosionGroup) return finalBigExplosionGroup;
      const group = new THREE.Group();
      group.userData.rings = [];
      for (const ring of finalBigExplosion.rings) {
        const geo = new THREE.RingGeometry(0.94, 1, 64);
        geo.rotateX(-Math.PI / 2);
        const mat = new THREE.MeshBasicMaterial({
          color: ring.color, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.y = 2;
        group.add(mesh);
        group.userData.rings.push({ mesh, ring });
      }
      const coreGeo = new THREE.SphereGeometry(1, 32, 24);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.y = 20;
      group.add(core);
      group.userData.core = core;

      group.position.set(toWorldX(finalBigExplosion.x), BASE_ALT, toDepthZ(finalBigExplosion.y));
      scene.add(group);
      finalBigExplosionGroup = group;
      return group;
    }

    function syncFinalBigExplosion() {
      if (!finalBigExplosion) {
        if (finalBigExplosionGroup) {
          scene.remove(finalBigExplosionGroup);
          finalBigExplosionGroup = null;
        }
        return;
      }
      const fw = finalBigExplosion;
      const baseT = fw.life / fw.maxLife;
      const group = ensureFinalBigExplosionGroup();

      const tLead = Math.min(1, baseT);
      const easeLead = Math.sqrt(tLead);
      // 巨大球体：カラフルに点滅しながらどんどん大きくなる。
      // 数フレームごとに虹色を切り替えて派手に点滅させる。
      const FLASH_COLORS = [
        0xff2266, 0xff8a00, 0xffee00, 0x22ff66,
        0x22ccff, 0x4466ff, 0xaa44ff, 0xff44cc
      ];
      const flashColor = FLASH_COLORS[Math.floor(fw.life / 4) % FLASH_COLORS.length];
      group.userData.core.material.color.setHex(flashColor);
      // 終盤は少しだけ薄れて消える
      group.userData.core.material.opacity = 0.9 * Math.max(0, 1 - Math.max(0, baseT - 0.85) / 0.15);
      // 通常の1.6倍まで膨らむ巨大球体
      group.userData.core.scale.setScalar(Math.max(0.001, fw.maxRadius * 1.6 * easeLead));

      for (const { mesh, ring } of group.userData.rings) {
        const tRaw = (baseT - ring.delay) / (1 - ring.delay);
        if (tRaw <= 0 || tRaw >= 1.1) {
          mesh.material.opacity = 0;
          continue;
        }
        const t = Math.min(1, tRaw);
        const ease = Math.sqrt(t);
        const radius = Math.max(0.001, fw.maxRadius * ease);
        mesh.scale.setScalar(radius);
        mesh.material.opacity = Math.max(0, (1 - baseT) * 0.9);
      }
    }

    function syncPlayerMesh() {
      playerMesh.position.set(
        toWorldX(player.x + player.w / 2),
        BASE_ALT,
        toDepthZ(player.y + player.h / 2)
      );
      // 左右移動時に機体を5度傾ける（左移動＝左に、右移動＝右に）。
      // 直前フレームからのx移動量で向きを判定する。
      const dx = player.x - (player._lastX ?? player.x);
      player._lastX = player.x;
      const TILT = 5 * Math.PI / 180;
      let roll = 0;
      if (dx > 0.01) roll = TILT;         // 右へ移動 → 右に傾ける（右翼が下がる）
      else if (dx < -0.01) roll = -TILT;  // 左へ移動 → 左に傾ける（左翼が下がる）
      playerMesh.rotation.z = roll;
    }

    function syncStarfieldMotion() {
      syncStarGeometry();
    }

    function render3D() {
      syncBoxEntities(bullets);
      syncBoxEntities(enemyBullets);
      syncBoxEntities(enemies);
      syncBoxEntities(powerStars);
      syncBoxEntities(doubleShotStars);
      syncTrails();
      syncExplosions();
      syncFinalBigExplosion();
      syncPlayerMesh();
      syncStarfieldMotion();

      ground.visible = (clearPhase === 0);
      spawnGlow.visible = (clearPhase === 0);
      starPoints.visible = false;
      // ラスボスが出る直前に横壁・天井の格子を消す。
      // finalMode開始（1800点超え）直後はまだ中ボス戦などが続いているので格子は残し、
      // ラスボス出現までのディレイ終盤（残り3秒）＝空白時間に入ってから排除する。
      const bossImminent = finalMode && (finalBossSpawned || finalDelayFrames <= 60 * 3);
      const showTunnel = tunnelMode && clearPhase === 0 && !bossImminent;
      applyTunnelVisible(showTunnel);
      if (showTunnel) updateTunnel();
      updateGroundScroll();

      renderer.render(scene, camera);
    }

    /* =========================================================================
       HUD（スコア・タイトル・ゲームオーバー等のテキストのみ）2D描画レイヤー
       ========================================================================= */

    function drawTitleHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.textAlign = "center";

      hctx.fillStyle = "#00ffff";
      hctx.font = "46px monospace";
      hctx.fillText("THE SHOOTINGⅢ", CANVAS_W / 2, 115);

      if (isTouchDevice) {
        // スマホ：横向き・傾き操作・タッチ発射の案内
        hctx.font = "18px monospace";
        hctx.fillStyle = "#88ff88";
        hctx.fillText("SMARTPHONE / 横向き", CANVAS_W / 2, 162);

        hctx.font = "16px monospace";
        hctx.fillText("左右に傾けて移動", CANVAS_W / 2, 192);
        hctx.fillText("奥に倒すと前進・画面タッチで発射", CANVAS_W / 2, 217);

        const blinkOn = Math.floor(frameCount / 30) % 2 === 0;
        if (blinkOn) {
          hctx.font = "20px monospace";
          hctx.fillStyle = "#ffffff";
          hctx.fillText("TAP TO START", CANVAS_W / 2, 300);
        }
      } else {
        hctx.font = "18px monospace";
        hctx.fillStyle = "#88ff88";
        hctx.fillText("PC PLAY ONLY", CANVAS_W / 2, 162);

        hctx.font = "16px monospace";
        hctx.fillStyle = "#88ff88";
        hctx.fillText("操作　←↑↓→ & SPACE", CANVAS_W / 2, 192);

        hctx.font = "16px monospace";
        hctx.fillStyle = "#88ff88";
        hctx.fillText("KEYBOARD & GAME CONTROLLER", CANVAS_W / 2, 217);

        const blinkOn = Math.floor(frameCount / 30) % 2 === 0;
        if (blinkOn) {
          hctx.font = "20px monospace";
          hctx.fillStyle = "#ffffff";
          hctx.fillText("PUSH ANY BUTTON", CANVAS_W / 2, 300);
        }
      }
      hctx.textAlign = "left";
    }

    function drawUIHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.fillStyle = "#fff";
      hctx.font = "18px sans-serif";
      hctx.fillText("SCORE: " + score, 10, 24);
      if (superBeginnerMode) {
        hctx.fillStyle = "#ffd24a";
        hctx.font = "13px sans-serif";
        hctx.fillText("超初心者無敵モード", 10, 44);
      }
    }

    // デモプレイ中の表示：画面中央に「Demonstration」を白で点滅させる
    function drawDemoOverlay() {
      const blinkOn = Math.floor(frameCount / 30) % 2 === 0;
      if (!blinkOn) return;
      hctx.fillStyle = "#ffffff";
      hctx.font = "28px monospace";
      hctx.textAlign = "center";
      hctx.fillText("Demonstration", CANVAS_W / 2, CANVAS_H / 2);
      hctx.textAlign = "left";
    }

    function drawGameOverHud() {
      hctx.fillStyle = "#fff";
      hctx.font = "18px sans-serif";
      hctx.fillText("SCORE: " + score, 10, 24);

      hctx.fillStyle = "rgba(0,0,0,0.6)";
      hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.fillStyle = "#fff";
      hctx.font = "32px sans-serif";
      hctx.textAlign = "center";
      hctx.fillText("GAME OVER", CANVAS_W / 2, CANVAS_H / 2 - 10);
      hctx.font = "14px sans-serif";
      hctx.fillText("PUSH ANY BUTTON", CANVAS_W / 2, CANVAS_H / 2 + 30);
      if (consecutiveGameOvers >= 2) {
        // 2回連続でゲームオーバーになったら救済コマンドを教える
        hctx.fillStyle = "#ffd24a";
        hctx.font = "14px sans-serif";
        hctx.fillText("超初心者無敵モード：ゲーム中に Z キー", CANVAS_W / 2, CANVAS_H / 2 + 58);
      }
      hctx.textAlign = "left";
    }

    function drawClearFlashHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      if (clearFlashTimer > 0) {
        const alpha = clearFlashTimer / 15;
        hctx.fillStyle = `rgba(255,255,255,${alpha})`;
        hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      }
    }

    // ===== エンディング画像 =====
    const endingImage = new Image();
    endingImage.src = "Game/last.jpg";
    let endingImageLoaded = false;
    endingImage.onload = () => { endingImageLoaded = true; };

    function drawClearScreenHud() {
      if (endingImageLoaded) {
        hctx.drawImage(endingImage, 0, 0, CANVAS_W, CANVAS_H);
      } else {
        hctx.fillStyle = "#000";
        hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        hctx.fillStyle = "#ffffff";
        hctx.textAlign = "center";
        hctx.font = "26px monospace";
        hctx.fillText("CONGRATULATION!", CANVAS_W / 2, CANVAS_H / 2);
        hctx.font = "16px monospace";
        hctx.fillText("PUSH BUTTON TO TITLE", CANVAS_W / 2, CANVAS_H / 2 + 40);
        hctx.textAlign = "left";
      }
    }

    // クリア後の「ハードモード案内」黒画面（英語・白文字）
    function drawHardModePromptHud() {
      hctx.fillStyle = "#000";
      hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.fillStyle = "#ffffff";
      hctx.textAlign = "center";
      hctx.font = "20px monospace";
      hctx.fillText("To Take On A Slightly Harder Mode,", CANVAS_W / 2, CANVAS_H / 2 - 12);
      hctx.fillText("Press The Q Button", CANVAS_W / 2, CANVAS_H / 2 + 22);
      hctx.textAlign = "left";
    }

    // ハードモード＝Qモード（格子トンネル）で開始
    function startHardMode() {
      startGame();
      tunnelMode = true;
      zigzagSpawnTimer = randInt(90, 150); // ハードモードは蛇行敵を早めに
    }

    function updateClearExplosionPhase() {
      clearFrame++;
      updateFinalBigExplosion();

      if (finalBigExplosion && finalBigExplosion.life >= finalBigExplosion.maxLife && clearFlashTimer === 0) {
        clearFlashTimer = 15;
      }

      if (clearFlashTimer > 0) {
        clearFlashTimer--;
        if (clearFlashTimer === 0) {
          clearPhase = 2;
          clearFrame = 0;
          finalBigExplosion = null;
        }
      }
    }

    function updateCruisePhase() {
      clearFrame++;

      for (const s of stars) {
        s.y += 1.5;
        if (s.y > FIELD_H) s.y -= FIELD_H;
      }

      player.y -= 0.8;
      const limitY = FIELD_H * 0.3;
      if (player.y < limitY) player.y = limitY;

      if (clearFrame >= 60 * 5) {
        clearPhase = 3;
        clearFrame = 0;
        gameCleared = true;
        consecutiveGameOvers = 0; // クリアしたら「連続ゲームオーバー」は途切れる
      }
    }

    // ===== メインループ =====
    enemySpawnTimer = 30;

    function loop() {
      frameCount++;

      try {
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        const pad0 = (activeGamepadIndex != null) ? pads[activeGamepadIndex] : pads[0];
        // ボタンの押下状態を更新する（gamepadAnyJustPressed をこの中で毎フレーム更新）
        isGamepadRestartJustPressed(pad0);

        if (clearPhase === 1) {
          updateClearExplosionPhase();
          syncPlayerMesh();
          syncFinalBigExplosion();
          ground.visible = false;
          spawnGlow.visible = false;
          starPoints.visible = false;
          applyTunnelVisible(false);
          renderer.render(scene, camera);
          drawClearFlashHud();
        } else if (clearPhase === 2) {
          updateCruisePhase();
          syncPlayerMesh();
          syncStarfieldMotion();
          ground.visible = false;
          spawnGlow.visible = false;
          starPoints.visible = true;
          applyTunnelVisible(false);
          renderer.render(scene, camera);
          hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        } else if (clearPhase === 3) {
          drawClearScreenHud();
          // クリア画像の表示中はどれかのボタンでハードモード案内の黒画面へ。
          // ただしQモード（ハードモード）でクリアした場合は勧誘せず直接タイトルへ。
          // （キーボードはkeydownリスナー側で処理）
          if (gamepadAnyJustPressed) {
            if (tunnelMode) backToTitle();
            else { clearPhase = 4; clearFrame = 0; }
          }
        } else if (clearPhase === 4) {
          drawHardModePromptHud();
          // 黒画面：ゲームパッドはどのボタンでもタイトルへ（ハードモード開始はキーボードのQのみ）
          if (gamepadAnyJustPressed) backToTitle();
        } else if (!gameStarted) {
          syncPlayerMesh();
          syncStarfieldMotion();
          ground.visible = true;
          spawnGlow.visible = true;
          starPoints.visible = false;
          applyTunnelVisible(false);
          updateGroundScroll();
          renderer.render(scene, camera);
          drawTitleHud();
          if (pad0 && pad0.buttons && pad0.buttons.some(b => b.pressed)) {
            unlockBgm();
            startGame();
          } else if (!isTouchDevice && performance.now() - titleIdleStartMs >= demoIdleMs) {
            // タイトル画面を一定時間放置したらデモプレイ開始（初回5秒・以降10秒）。
            // スマホはタップでプレイするのでデモは出さない。
            startDemo();
          }
        } else {
          // デモ中・ゲームオーバー中は、ゲームパッドのどのボタンでもタイトルへ戻る
          // （キーボードはkeydown、タッチ／クリックはpointerdownで処理）
          if (demoMode && gamepadAnyJustPressed) {
            exitDemo();
          } else if (!demoMode && !gameCleared && gameOver && gamepadAnyJustPressed) {
            backToTitle();
          }

          if (!gameStarted) {
            // 直前のexitDemoでタイトルに戻った。このフレームは何も描かず
            // 次のフレームからタイトル画面の分岐に入る
          } else if (!gameOver) {
            if (demoMode) updateDemoPlayer(); else updatePlayer();
            updateBullets();
            updateEnemyBullets();
            updateEnemies();
            updateStarsPower();
            updateDoubleShotStars();
            handleCollisions();
            updateExplosions();

            render3D();
            drawUIHud();
            if (demoMode) drawDemoOverlay();
          } else if (demoMode) {
            // デモ中にやられたら爆発を少し見せてからタイトルへ
            updateExplosions();
            render3D();
            drawUIHud();
            drawDemoOverlay();
            demoOverFrames++;
            if (demoOverFrames >= 120) exitDemo();
          } else {
            updateExplosions();
            render3D();
            drawGameOverHud();
          }
        }

        lastError = null;
      } catch (e) {
        lastError = e;
        console.error(e);
      }

      requestAnimationFrame(loop);
    }

    function handleResize() {
      layoutCamera();
    }
    window.addEventListener("resize", handleResize);

    loop();
  </script>
