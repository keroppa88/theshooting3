<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>The Shooting Ⅲ</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
      height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: sans-serif;
    }
    #stage {
      position: relative;
      width: 760px;
      height: 640px;
      background: #000;
      border: 2px solid #555;
      outline: none;
    }
    #stage canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 760px;
      height: 640px;
      display: block;
    }
    #hud {
      pointer-events: auto;
    }

    /* ===== スマホ（タッチ端末）表示 =====
       スマホは横画面専用。横向きに構えたとき、ゲーム画面(760:640)が
       画面内に収まるようアスペクト比を保ってフィットさせる。
       JSがタッチ端末を検知したときだけ body.mobile-fit が付く。 */
    body.mobile-fit {
      align-items: center;
      /* タッチでのスクロール・ピンチ・ダブルタップ拡大を無効化 */
      touch-action: none;
      overflow: hidden;
    }
    body.mobile-fit #stage {
      width: min(100vw, calc(100vh * 760 / 640));
      height: min(100vh, calc(100vw * 640 / 760));
      border: none;
      touch-action: none;
    }
    body.mobile-fit #stage canvas {
      width: 100%;
      height: 100%;
    }

    /* 縦向きのときは「横向きにしてください」の案内を全面に出す */
    #rotate-notice { display: none; }
    body.mobile-fit #rotate-notice {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      line-height: 1.8;
      gap: 8px;
    }
    @media (orientation: portrait) {
      body.mobile-fit #rotate-notice { display: flex; }
    }
  </style>
</head>
<body>
  <div id="stage" tabindex="0">
    <canvas id="webgl" width="760" height="640"></canvas>
    <canvas id="hud"   width="760" height="640"></canvas>
  </div>

  <!-- スマホを縦に持ったときの回転案内（横向き専用） -->
  <div id="rotate-notice">
    <div style="font-size:40px">📱↻</div>
    <div>横向きにしてください</div>
    <div style="font-size:15px;color:#9cf">Please rotate to landscape</div>
  </div>

  <!-- BGM用YouTubeプレーヤー（画面外に隠して音だけ使う） -->
  <div id="bgm-player" style="position:absolute; left:-9999px; top:-9999px;" aria-hidden="true"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { VOXLoader, VOXMesh } from "./vendor/three/VOXLoader.js";

    // ===== 画面/フィールド寸法（元の2Dゲームロジックの座標系をそのまま踏襲） =====
    const FIELD_W = 480;
    const FIELD_H = 640;

    // ===== 実際の描画（キャンバス）サイズ。斜めの3D視点でゲーム領域全部が
    // 見えるよう、ゲーム座標系(FIELD_W/FIELD_H)より横に広く取る。はみ出た分は黒。
    const CANVAS_W = 760;
    const CANVAS_H = 640;

    const stage = document.getElementById("stage");
    const hud = document.getElementById("hud");
    const hctx = hud.getContext("2d");

    // クリック/タップでも開始できるようにする（フォーカス問題対策）。
    // ただしタッチ端末（スマホ）はプレイ不可＝タップで開始・リスタートはさせない
    // （デモをタッチしたらタイトルへ戻る処理はdocumentのpointerdownが担当）。
    stage.tabIndex = 0;
    stage.addEventListener("pointerdown", () => {
      unlockBgm();
      if (isTouchDevice) return;
      if (!gameStarted && clearPhase === 0 && !gameCleared) {
        startGame();
      } else if (gameCleared) {
        backToTitle();
      } else if (gameStarted && gameOver && !demoMode) {
        startGame();
      }
    });
    stage.focus();

    // ===== 効果音 =====
    const shootSound         = new Audio("Game/shoot.mp3");
    const enemyExplodeSound  = new Audio("Game/enemy_explode.mp3");
    const playerExplodeSound = new Audio("Game/player_explode.mp3");
    const starSound          = new Audio("Game/star.mp3");

    shootSound.volume         = 0.18;
    enemyExplodeSound.volume  = 0.18;
    playerExplodeSound.volume = 0.18;
    starSound.volume          = 0.27;

    function playSound(sound) {
      const s = sound.cloneNode();
      s.volume = sound.volume;
      const p = s.play();
      // ユーザー操作前（デモプレイ中など）は自動再生がブロックされることが
      // あるため、失敗は無視して無音で続行する
      if (p && p.catch) p.catch(() => {});
    }

    // ===== BGM（YouTube IFrame API。最初の敵を倒したときに鳴らす） =====
    // 3曲を順番にループ再生する。どの曲から始まるかはランダム。
    // APIの読み込みや再生に失敗してもゲーム本体には影響しない（無音で続行）。
    const BGM_VIDEO_IDS = ["SkypZuY6ZvA", "NOMa56y_Was", "G6tuvKE6_lA", "2fD9TBKHAdE"];
    // 開始曲はページを開くたびに必ず変える：前回の開始曲をlocalStorageに記録して
    // 次の曲から始める（記録が使えない環境ではランダムにフォールバック）
    let bgmTrackIndex;
    try {
      const prev = parseInt(localStorage.getItem("bgmStartIndex"), 10);
      bgmTrackIndex = (Number.isInteger(prev)
        ? (prev + 1) % BGM_VIDEO_IDS.length
        : (Math.random() * BGM_VIDEO_IDS.length) | 0);
      localStorage.setItem("bgmStartIndex", String(bgmTrackIndex));
    } catch (e) {
      bgmTrackIndex = (Math.random() * BGM_VIDEO_IDS.length) | 0;
    }
    const BGM_VOLUME = 22;     // 0〜100
    let bgmUnlocked = false;   // ユーザー操作があったか（ブラウザの自動再生制限対策）
    let bgmPlaying  = false;   // 再生を開始したか（以後は曲送りで無限ループ）
    let bgmWantPlay = false;   // ゲーム側から再生要求が出ているか
    let ytPlayer = null;
    let ytReady  = false;

    (function loadYouTubeApi() {
      try {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        tag.onerror = () => {};
        document.head.appendChild(tag);
      } catch (e) { /* BGMなしで続行 */ }
    })();

    window.onYouTubeIframeAPIReady = function () {
      try {
        ytPlayer = new YT.Player("bgm-player", {
          width: 200, height: 200,
          videoId: BGM_VIDEO_IDS[bgmTrackIndex],
          playerVars: { autoplay: 0, controls: 0, disablekb: 1, playsinline: 1, rel: 0 },
          events: {
            onReady: () => {
              ytReady = true;
              ytPlayer.setVolume(BGM_VOLUME);
              tryStartBgm();
            },
            onStateChange: (ev) => {
              // 曲が終わったら次の曲へ。末尾まで行ったら先頭に戻る＝全体をループ
              if (ev.data === YT.PlayerState.ENDED && bgmPlaying) {
                bgmTrackIndex = (bgmTrackIndex + 1) % BGM_VIDEO_IDS.length;
                try { ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]); } catch (e) {}
              }
            },
            onError: () => {
              // 再生できない曲はスキップして次の曲へ
              if (!bgmPlaying) return;
              bgmTrackIndex = (bgmTrackIndex + 1) % BGM_VIDEO_IDS.length;
              try { ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]); } catch (e) {}
            }
          }
        });
      } catch (e) { /* BGMなしで続行 */ }
    };

    function tryStartBgm() {
      if (!bgmWantPlay || !bgmUnlocked || !ytReady || bgmPlaying) return;
      try {
        ytPlayer.setVolume(BGM_VOLUME);
        ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]);
        bgmPlaying = true;
      } catch (e) { /* BGMなしで続行 */ }
    }

    function unlockBgm() {
      bgmUnlocked = true;
      tryStartBgm();
    }

    function startBgmIfReady() {
      bgmWantPlay = true;
      tryStartBgm();
    }

    // ===== 状態フラグ =====
    let gameStarted  = false;
    let gameOver     = false;
    let gameCleared  = false;

    let clearPhase = 0;
    let clearFrame = 0;
    let clearExplosionX = FIELD_W / 2;
    let clearExplosionY = FIELD_H / 2;

    let lastError = null;

    let finalBigExplosion = null;
    let clearFlashTimer = 0;

    const missileScorePoints = [500, 600, 700, 800, 900, 1000];
    const starScorePoints         = [1000,1300];
    const doubleShotStarPoints    = [1500];
    const doubleShotEndScore      = 1800;
    const missileSpawned = {};
    const starSpawned    = {};
    const doubleShotStarSpawned = {};

    // ===== 超初心者無敵モード（キーボードのZキーで切り替え） =====
    // 発動すると自機の当たり判定が無くなり、弾に当たっても敵に当たっても死なない。
    // 敵・ミサイル・壁・敵の動きはすべて通常どおり（無敵になるだけ）。
    // 無敵中にもう一度Zを押すと解除（トグル式）。
    let superBeginnerMode = false;
    let consecutiveGameOvers = 0; // クリアでリセット。2以上でゲームオーバー画面にヒントを出す

    // ===== デモプレイ（タイトル画面を5秒放置で開始） =====
    // 自機をAIが操作するデモ画面。何かのキー／ゲームパッドのボタン／
    // 画面タッチ（クリック含む）でタイトル画面に戻る。
    let demoMode = false;
    let demoOverFrames = 0;          // デモ中にやられた後、タイトルへ戻るまでの待ち
    let titleIdleStartMs = performance.now();
    // タイトル放置からデモに移るまでの待ち時間。初回は5秒、2回目以降は10秒。
    let demoIdleMs = 5000;

    function startDemo() {
      demoMode = true;
      demoOverFrames = 0;
      demoRetargetTimer = 0; // 開始直後に最初の目標地点を選び直す
      demoIdleMs = 10000;    // 次回からのデモ開始は10秒後
      startGame();
    }

    function exitDemo() {
      demoMode = false;
      backToTitle(); // タイトル放置タイマーもbackToTitle内でリセットされる
    }

    // デモ中の自機操作：ランダムな目標地点に向かって縦横に動き回りながら
    // 弾を撃ち続けるだけ。避けたり狙ったりはしないので途中で死ぬこともある
    // （死んだら爆発を見せてタイトルへ戻る）。
    // 行動範囲は手前の格子3マス分以内＝スクリーン表示で画面の下部1/3程度に限定し、
    // 奥へ行きすぎないようにする。遠近法で奥がつぶれて見えるため、2D座標の1/3では
    // なくカメラ投影で「画面の下1/3」に映る範囲（2D y≈560〜）を使う。
    // y=560は自機の通常開始位置と同じ＝画面の約65%の高さに映る。
    const DEMO_MIN_Y = FIELD_H - 80;
    let demoTargetX = 0;
    let demoTargetY = 0;
    let demoRetargetTimer = 0;
    function updateDemoPlayer() {
      demoRetargetTimer--;
      const reached = Math.abs(demoTargetX - player.x) <= player.speed &&
                      Math.abs(demoTargetY - player.y) <= player.speed;
      if (demoRetargetTimer <= 0 || reached) {
        // 次の目標地点をランダムに選ぶ。縦は下部1/3の範囲内だけ
        demoTargetX = Math.random() * (FIELD_W - player.w);
        demoTargetY = DEMO_MIN_Y + Math.random() * (FIELD_H - DEMO_MIN_Y - player.h);
        demoRetargetTimer = randInt(30, 90);
      }
      const dx = demoTargetX - player.x;
      const dy = demoTargetY - player.y;
      if (Math.abs(dx) > player.speed) player.x += Math.sign(dx) * player.speed;
      if (Math.abs(dy) > player.speed) player.y += Math.sign(dy) * player.speed;
      player.x = Math.max(0, Math.min(FIELD_W - player.w, player.x));
      player.y = Math.max(DEMO_MIN_Y, Math.min(FIELD_H - player.h, player.y));

      // 撃ちっぱなし（通常プレイと同じ連射間隔）
      if (player.fireCooldown > 0) player.fireCooldown--;
      if (player.fireCooldown === 0) {
        firePlayerShots();
        player.fireCooldown = 8;
      }
      // パワーアップの時間経過はupdatePlayerと同じ扱い
      if (powerUpActive) {
        powerUpTimer--;
        if (powerUpTimer <= 0) powerUpActive = false;
      }
      if (doubleShotActive && score >= doubleShotEndScore) {
        doubleShotActive = false;
      }
    }

    // タッチ主体端末（pointer: coarse）＝スマホ等。スマホは横画面専用で、
    // 端末の傾きで自機を操作し、画面タッチで弾を撃ち続ける。
    const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

    // スマホは横向きにフィット表示（CSSの body.mobile-fit）
    if (isTouchDevice) document.body.classList.add("mobile-fit");

    // ===== スマホの傾き操作（DeviceOrientation） =====
    // 横画面で構えたときに：左右の傾き＝左右移動、前後の傾き＝前後移動。
    // 直立／画面を下に傾けた状態＝最も手前、奥に倒すほど前へ。
    let tiltActive = false;       // センサー値を受信できているか
    let tiltPermRequested = false;
    let tiltBeta = 0;             // 前後（ポートレート基準）[-180,180]
    let tiltGamma = 0;            // 左右（ポートレート基準）[-90,90]
    let touchFiring = false;      // 画面タッチ中は発射し続ける

    function onDeviceOrientation(e) {
      if (e.beta === null && e.gamma === null) return;
      tiltBeta = e.beta || 0;
      tiltGamma = e.gamma || 0;
      tiltActive = true;
    }

    // iOS13+ は許可が必要。ユーザー操作（最初のタップ）から呼ぶ。
    function enableTilt() {
      if (tiltPermRequested) return;
      tiltPermRequested = true;
      try {
        const DOE = window.DeviceOrientationEvent;
        if (DOE && typeof DOE.requestPermission === "function") {
          DOE.requestPermission().then(res => {
            if (res === "granted") window.addEventListener("deviceorientation", onDeviceOrientation, true);
          }).catch(() => {});
        } else if (DOE) {
          window.addEventListener("deviceorientation", onDeviceOrientation, true);
        }
      } catch (err) { /* 非対応端末は無視 */ }
    }

    // 横向きへ固定（対応端末のみ・ベストエフォート。iOSは非対応だがCSSの
    // 縦向き案内でカバー）。フルスクリーン化してからロックを試みる。
    function tryLockLandscape() {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(() => {});
        }
      } catch (err) { /* 無視 */ }
    }

    // 横向きの回転方向（screen.orientation.angle）に応じて軸の符号を決める。
    // 90（反時計回り）を既定とし、270/-90 は左右・前後を反転。
    function orientationAngle() {
      if (screen.orientation && typeof screen.orientation.angle === "number") return screen.orientation.angle;
      if (typeof window.orientation === "number") return (window.orientation + 360) % 360;
      return 90;
    }

    // 現在の傾きから steer(左右 -1..1) と pitchBack(前後 0..1) を求める。
    function readTilt() {
      const ang = orientationAngle();
      // 横向きでは、ポートレート基準の gamma が前後、beta が左右になる。
      let steerRaw, pitchRaw;
      if (ang === 270 || ang === -90) {   // 時計回り横向き
        steerRaw = -tiltBeta;
        pitchRaw = tiltGamma;
      } else {                             // 90（反時計回り）ほか
        steerRaw = tiltBeta;
        pitchRaw = -tiltGamma;
      }
      const steer = Math.max(-1, Math.min(1, steerRaw / 35));   // ±35度でフル
      // 奥に倒す(pitchRaw>0)ほど前へ。直立(0)・画面下向き(<0)は最も手前(0)。
      const pitchBack = Math.max(0, Math.min(1, pitchRaw / 45)); // 45度でフル前進
      return { steer, pitchBack };
    }

    // 画面タッチで発射し続ける／状態遷移（タイトル→開始、ゲームオーバー→タイトル等）
    if (isTouchDevice) {
      const updateTouchFiring = e => { touchFiring = (e.touches && e.touches.length > 0); };
      stage.addEventListener("touchstart", updateTouchFiring, { passive: true });
      stage.addEventListener("touchend", updateTouchFiring, { passive: true });
      stage.addEventListener("touchcancel", updateTouchFiring, { passive: true });
    }

    // タッチ／クリックでの状態遷移
    document.addEventListener("pointerdown", () => {
      if (demoMode) { exitDemo(); return; }
      if (!isTouchDevice) return;   // PCはポインタでゲーム操作しない

      unlockBgm();
      if (gameCleared) {
        // クリア後の画面遷移（Qはスマホに無いので勧誘画面はそのままタイトルへ）
        if (clearPhase === 3) {
          if (tunnelMode) backToTitle();
          else { clearPhase = 4; clearFrame = 0; }
        } else if (clearPhase === 4) {
          backToTitle();
        }
        return;
      }
      if (gameStarted && !gameOver) return;   // プレイ中のタッチは発射用（何もしない）
      if (gameStarted && gameOver) { backToTitle(); return; }
      if (!gameStarted && clearPhase === 0) {
        // タイトルからゲーム開始。傾き許可要求と横向き固定を試みる。
        enableTilt();
        tryLockLandscape();
        startGame();
      }
    });

    // 入力
    const keys = {};
    document.addEventListener("keydown", e => {
      keys[e.code] = true;
      unlockBgm();

      // デモ中はどのキーでもタイトル画面へ戻る
      if (demoMode) {
        exitDemo();
        return;
      }

      // ゲームオーバー画面ではどのキーでもタイトル画面へ戻る
      // （リピート＝キー押しっぱなしの連続入力は無視して、押した瞬間だけ拾う）
      if (gameStarted && !gameCleared && gameOver && !e.repeat) {
        backToTitle();
        return;
      }

      // ゲーム中にQキーで格子トンネル（デザインチェンジ）を切り替える
      if (gameStarted && !demoMode && !gameCleared && clearPhase === 0 && e.code === "KeyQ" && !e.repeat) {
        tunnelMode = !tunnelMode;
        if (tunnelMode) zigzagSpawnTimer = randInt(90, 150); // ONにしたら蛇行敵を早めに
        return;
      }

      // ゲーム中にZキーで超初心者無敵モードを切り替える（もう一度押すと解除）
      if (gameStarted && !demoMode && !gameCleared && clearPhase === 0 && e.code === "KeyZ" && !e.repeat) {
        superBeginnerMode = !superBeginnerMode;
        return;
      }

      if (!gameStarted && clearPhase === 0 && !gameCleared) {
        startGame();
        return;
      }

      // クリア後の画面遷移：
      //  clearPhase 3（クリア画像）→ 何かキーで clearPhase 4（ハードモード案内の黒画面）
      //  clearPhase 4（黒画面）→ Qでハードモード開始、それ以外はタイトルへ
      if (gameCleared) {
        if (e.repeat) return;
        if (clearPhase === 3) {
          // Qモード（ハードモード）でクリアした場合は勧誘画面を出さず直接タイトルへ
          if (tunnelMode) { backToTitle(); return; }
          clearPhase = 4;
          clearFrame = 0;
        } else if (clearPhase === 4) {
          if (e.code === "KeyQ") startHardMode();
          else backToTitle();
        } else {
          backToTitle();
        }
      }
    });

    document.addEventListener("keyup", e => {
      keys[e.code] = false;
    });

    // ゲームパッド
    let activeGamepadIndex = null;
    window.addEventListener("gamepadconnected", e => {
      activeGamepadIndex = e.gamepad.index;
    });
    window.addEventListener("gamepaddisconnected", e => {
      if (activeGamepadIndex === e.gamepad.index) activeGamepadIndex = null;
    });

    const restartGamepadButtons = [0, 1, 2, 3, 9]; // ABXY + START
    let prevGamepadButtons = [];
    // クリア画面「何かのボタンでタイトルへ」用：どれかのボタンが押された瞬間
    let gamepadAnyJustPressed = false;

    function isGamepadRestartJustPressed(gp) {
      if (!gp || !gp.buttons) {
        prevGamepadButtons = [];
        gamepadAnyJustPressed = false;
        return false;
      }
      const nextButtons = gp.buttons.map(b => !!(b && b.pressed));
      gamepadAnyJustPressed = nextButtons.some((p, idx) => p && !prevGamepadButtons[idx]);
      const pressed = restartGamepadButtons.some(idx => nextButtons[idx] && !prevGamepadButtons[idx]);
      prevGamepadButtons = nextButtons;
      return pressed;
    }

    function readGamepad() {
      if (!navigator.getGamepads) return null;
      const pads = navigator.getGamepads();
      let gp = (activeGamepadIndex != null) ? pads[activeGamepadIndex] : pads[0];
      if (!gp) return null;

      const lx = gp.axes[0] || 0;
      const ly = gp.axes[1] || 0;

      const shoot    = gp.buttons[0]  && gp.buttons[0].pressed;
      const dpadUp   = gp.buttons[12] && gp.buttons[12].pressed;
      const dpadDown = gp.buttons[13] && gp.buttons[13].pressed;
      const dpadLeft = gp.buttons[14] && gp.buttons[14].pressed;
      const dpadRight= gp.buttons[15] && gp.buttons[15].pressed;
      const start    = gp.buttons[9]  && gp.buttons[9].pressed;

      return { lx, ly, shoot, dpadUp, dpadDown, dpadLeft, dpadRight, start, raw: gp };
    }

    // ===== オブジェクト =====
    // w/hは当たり判定のサイズ。見た目の機体は固定スケール（PLAYER_VISUAL_*）で
    // 描画されるため、ここを変えても表示サイズは変わらない。
    // 横40：見た目の翼幅に近づける／縦18：見た目の機体の奥行きに合わせて薄くする
    // （以前の30×30は縦方向が見た目より大きく、避けたように見えて被弾していた）
    const player = {
      x: FIELD_W / 2 - 20,
      y: FIELD_H - 80,
      w: 40,
      h: 18,
      speed: 5,
      fireCooldown: 0
    };

    const bullets = [];
    const enemies = [];
    const enemyBullets = [];
    const explosions = [];
    const powerStars = [];
    const doubleShotStars = [];

    let powerUpActive = false;
    let powerUpTimer  = 0;
    let doubleShotActive = false;

    let enemySpawnTimer = 0;

    let trailSpawnTimer = 0;
    let hardTwinSpawnTimer = 0;
    let zigzagSpawnTimer = 0;

    let score = 0;
    let nextBossScore = 300;
    let frameCount = 0;

    let finalMode        = false;
    let finalDelayFrames = 0;
    let finalBossSpawned = false;

    const stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * FIELD_W,
        y: Math.random() * FIELD_H,
        size: 1 + Math.random() * 2
      });
    }

    function getShooterRatio(score) {
      if (finalMode) return 0;
      if (score > 1300) return 0.5;
      if (score > 1000) return 1/3;
      if (score > 500)  return 0.25;
      return 0;
    }

    function spawnEnemy() {
      spawnEnemyAt(Math.random() * (FIELD_W - 30), 0);
    }
    // Qモード編隊用：横位置x・奥行きオフセットyOffを指定して1機生成。
    function spawnEnemyAt(x, yOff = 0) {
      const w = 30;
      const h = 30;
      const y = -h + yOff;
      const speed = 2 + Math.random() * 2;

      const shooterRatio = getShooterRatio(score);
      const canShoot = (shooterRatio > 0) && (Math.random() < shooterRatio);
      const isDoublePattern = (score > 1300);

      const e = {
        x, y, w, h, speed,
        isBoss: false,
        isFinalBoss: false,
        isShooter: canShoot,
        isMissile: false,
        shotPattern: isDoublePattern ? "double" : "single",
        diagDir: (Math.random() < 0.5 ? -1 : 1),
        shotTimer: 0,
        shotsLeft: 0,
        trail: [],
        trailColor: TRAIL_COLORS[(Math.random()*TRAIL_COLORS.length)|0]
      };

      if (canShoot) {
        fireEnemyBulletsFromEnemy(e);
        e.shotsLeft = 1;
        e.shotTimer = 120;
      }

      enemies.push(e);
    }

    // Qモード時の出現パターン：ランダム単発ではなく編隊で出現させる。
    // 3機×約120フレームごとで平均出現数は通常（1機×40フレーム）と同程度。
    let qWaveIdx = 0;
    function spawnQWave() {
      const shape = qWaveIdx % 3; qWaveIdx++;
      const m = 20;
      const laneL = m, laneR = FIELD_W - 30 - m;
      const lane = f => laneL + (laneR - laneL) * f;
      if (shape === 0) {
        // 横一列
        spawnEnemyAt(lane(0.1), 0); spawnEnemyAt(lane(0.5), 0); spawnEnemyAt(lane(0.9), 0);
      } else if (shape === 1) {
        // V字（中央が前）
        spawnEnemyAt(lane(0.5), 0); spawnEnemyAt(lane(0.2), -55); spawnEnemyAt(lane(0.8), -55);
      } else {
        // 斜め（奥へずらす）
        spawnEnemyAt(lane(0.2), 0); spawnEnemyAt(lane(0.5), -45); spawnEnemyAt(lane(0.8), -90);
      }
    }

    const TRAIL_COLORS = [
      "#ffffff", "#ff0000", "#ff69b4",
      "#78c8ff", "#0078ff", "#00ffc8",
      "#96ff50", "#be78ff", "#ffff00",
      "#ffa500"
    ];

    function randInt(min, max) {
      return (min + Math.random() * (max - min + 1)) | 0;
    }

    function spawnTrailEnemy() {
      const w = 30;
      const h = 30;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "trail_enemy",
        x, y, w, h,
        speed: 2,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        color: "#ffdd44",
        trail: [],
        trailColor: TRAIL_COLORS[randInt(0, TRAIL_COLORS.length - 1)],
        shotTimer: 120
      });
    }

    function spawnZigzagEnemy() {
      const w = 30;
      const h = 30;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "zigzag_enemy",
        x, y, w, h,
        speed: 1.8,
        baseX: x,
        zigPhase: Math.random() * Math.PI * 2,
        zigAmp: 70,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        color: "#66ccff",
        shotTimer: 180
      });
    }

    function spawnHardTwin() {
      const w = 120;
      const h = 60;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "hard_twin",
        x, y, w, h,
        speed: 1.0,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        hp: 35
      });
    }

    function spawnMissilePair() {
      const count = 2;
      const w = 12;
      const h = 48;
      const speed = 6 * 1.5;
      for (let i = 0; i < count; i++) {
        const x = Math.random() * (FIELD_W - w);
        const y = -h;
        enemies.push({
          x, y, w, h, speed,
          isBoss: false,
          isFinalBoss: false,
          isShooter: false,
          isMissile: true
        });
      }
    }

    function spawnStar() {
      const size = 20;
      const x = Math.random() * (FIELD_W - size);
      const y = -size;
      powerStars.push({ x, y, size, w: size, h: size, speed: 2 });
    }

    function spawnDoubleShotStar() {
      const size = 20;
      const x = Math.random() * (FIELD_W - size);
      const y = -size;
      doubleShotStars.push({ x, y, size, w: size, h: size, speed: 2.2 });
    }

    function createBossAt(x) {
      const baseW = 30;
      const baseH = 30;
      const w = baseW * 9;
      const h = baseH * 9;
      const y = -h;
      const speed = 2;
      enemies.push({
        x, y, w, h, speed,
        isBoss: true,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        hp: 20,
        shotTimer: 180
      });
    }

    function spawnBoss() {
      const baseW = 30;
      const w = baseW * 9;
      const x = (FIELD_W - w) / 2;
      createBossAt(x);
    }

    function spawnBossPair() {
      const baseW = 30;
      const w = baseW * 9;
      const leftX  = FIELD_W * 0.25 - w / 2;
      const rightX = FIELD_W * 0.75 - w / 2;
      createBossAt(leftX);
      createBossAt(rightX);
    }

    function spawnFinalBoss() {
      // 画面の端から端まで左右に往復させるため、横幅を画面幅の半分にする。
      // 以前は画面幅とほぼ同じ大きさで、往復の余地が数十pxしかなく
      // 「小刻みに震える」だけになっていた。半分にすると残り半分を移動でき、
      // 機体の左右の端がそれぞれ画面の端に届く＝端から端への往復になる。
      const h = FIELD_W / 2;
      const w = h;
      const x = (FIELD_W - w) / 2;
      // 定位置（左右往復する場所）は格子2マス分（1マス≒33px）後ろ。
      const y = FIELD_H * 0.05 - 66;
      // 端から端へゆったり往復する速さ（範囲が広がったので分かりやすく動く）
      const speed = 3;

      // Qモード（ハードモード）のラスボスは専用の10秒サイクルで動く。
      //  patrol 6秒（左右往復・3秒目と4秒目に3方向弾）→ 前へ1秒 → 滞在2秒 → 戻る1秒。
      // 通常は patrol 8秒 → 前へ2秒 → 滞在1秒 → 戻る2秒。
      const qBoss = tunnelMode;
      // 前進時に止まる位置。通常は見た目の前面が「手前2格子分（約67px）」を残す位置で
      // 止め、そこは自機が安全に退避できる領域として確保する。
      // Qモードは最前面（画面の一番手前）まで出てくる（退避領域なし）。
      // 見た目の奥行き＝h/DEPTH_SCALE。前面フィールドy＝中心cy＋見た目奥行き/2。
      const SAFE_FRONT = qBoss ? 0 : 67;
      const lungeTargetY = (FIELD_H - SAFE_FRONT) - h / 2 - h / (2 * DEPTH_SCALE);
      const lungeDur = qBoss ? 60 : 120;       // 前進／後退にかける時間
      const lungeStep = (lungeTargetY - y) / lungeDur;

      enemies.push({
        x, y, w, h, speed,
        isBoss: true,
        isFinalBoss: true,
        isShooter: false,
        isMissile: false,
        hp: 130,
        moveDir: 1,
        shotTimer: 120,
        qBoss,
        // ===== 前進ラッシュ（ランジ）の状態 =====
        homeY: y,
        lungeTargetY,
        lungeStep,
        lungeDur,
        lungePhase: "patrol",   // patrol → lungeOut → lungeHold → lungeBack → patrol
        phaseTimer: qBoss ? 60 * 6 : 60 * 8,   // patrolの長さ（Q=6秒／通常=8秒）
        lungeHoldShotTimer: 0   // 前へ出た位置での発射間隔（通常のみ）
      });
    }

    function checkBossSpawn() {
      if (finalMode) return;

      while (score >= nextBossScore) {
        if (nextBossScore === 1200) {
          nextBossScore += 300;
          continue;
        }
        if (nextBossScore === 1500) {
          spawnBossPair();
        } else {
          spawnBoss();
        }
        nextBossScore += 300;
      }
    }

    function tryStartFinalMode() {
      if (!finalMode && score > 1800) {
        finalMode = true;
        finalDelayFrames = 60 * 10;
      }
    }

    function handleScoreEvents() {
      for (const p of missileScorePoints) {
        if (!missileSpawned[p] && score >= p) {
          spawnMissilePair();
          missileSpawned[p] = true;
        }
      }
      for (const p of starScorePoints) {
        if (!starSpawned[p] && score >= p) {
          spawnStar();
          starSpawned[p] = true;
        }
      }
      if (score < doubleShotEndScore) {
        for (const p of doubleShotStarPoints) {
          if (!doubleShotStarSpawned[p] && score > p) {
            spawnDoubleShotStar();
            doubleShotStarSpawned[p] = true;
          }
        }
      }
    }

    function createFinalBigExplosion(x, y) {
      const maxRadius = Math.min(FIELD_W, FIELD_H) * 0.6;
      const maxLife   = 120;

      const baseColors = [
        "#ffffff", "#ffe066", "#ff9933", "#ff5555", "#ff66ff",
        "#66ccff", "#66ff66", "#ffff66", "#ff99cc", "#99ff99",
        "#99ccff", "#ffcc66", "#ff6666", "#ccccff", "#ffffff"
      ];

      const rings = [];
      for (let i = 0; i < 15; i++) {
        rings.push({
          color: baseColors[i % baseColors.length],
          delay: i * 0.03,
          width: 3 + i * 0.3
        });
      }

      finalBigExplosion = { x, y, life: 0, maxLife, maxRadius, rings };
    }

    function updateFinalBigExplosion() {
      if (!finalBigExplosion) return;
      finalBigExplosion.life++;
    }

    function startClearSequence(cx, cy) {
      clearPhase = 1;
      clearFrame = 0;
      for (const ex of explosions) removeMesh3D(ex);
      for (const b of bullets) removeMesh3D(b);
      for (const b of enemyBullets) removeMesh3D(b);
      for (const e of enemies) removeMesh3D(e);
      removeAllTrails();
      explosions.length = 0;
      bullets.length = 0;
      enemyBullets.length = 0;
      enemies.length = 0;

      clearExplosionX = (cx !== undefined) ? cx : FIELD_W / 2;
      clearExplosionY = (cy !== undefined) ? cy : FIELD_H / 2;

      createFinalBigExplosion(clearExplosionX, clearExplosionY);
      clearFlashTimer = 0;
    }

    // ===== 自機弾 =====
    function spawnPlayerBullet(angleDeg, offsetX = 0) {
      const speed = 8;
      const rad = angleDeg * Math.PI / 180;
      const vx = Math.sin(rad) * speed;
      const vy = -Math.cos(rad) * speed;

      bullets.push({
        x: player.x + player.w / 2 - 3 + offsetX,
        y: player.y,
        w: 6,
        h: 12,
        vx,
        vy
      });
    }

    function firePlayerShots() {
      const baseAngles = powerUpActive ? [-20, 0, 20] : [0];
      if (doubleShotActive) {
        const offset = 8;
        for (const ang of baseAngles) {
          spawnPlayerBullet(ang, -offset);
          spawnPlayerBullet(ang,  offset);
        }
      } else {
        for (const ang of baseAngles) {
          spawnPlayerBullet(ang);
        }
      }
      playSound(shootSound);
    }

    // ===== 敵弾 =====
    function fireEnemyBulletsFromEnemy(enemy) {
      const speed = 5;
      const angle = Math.PI / 6;

      const cx = enemy.x + enemy.w / 2 - 2;
      const cy = enemy.y + enemy.h / 2;

      if (enemy.shotPattern === "double") {
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: 0, vy: speed });
        const vx = Math.sin(angle) * speed * enemy.diagDir;
        const vy = Math.cos(angle) * speed;
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx, vy });
      } else {
        const vx = Math.sin(angle) * speed * enemy.diagDir;
        const vy = Math.cos(angle) * speed;
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx, vy });
      }
    }

    function fireFinalBossBullets(boss, speedScale = 1) {
      const speed = 6 * 1.5 * speedScale;
      const angle = Math.PI / 6;

      const cx = boss.x + boss.w * 0.5;
      const cy = boss.y + boss.h * 0.78;

      // boss:true でラスボス弾を目立つ専用色（白／格子線が白に近い時はピンク）にする
      enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: 0, vy: speed, boss: true });
      enemyBullets.push({
        x: cx, y: cy, w: 4, h: 10,
        vx: -Math.sin(angle) * speed,
        vy:  Math.cos(angle) * speed,
        boss: true
      });
      enemyBullets.push({
        x: cx, y: cy, w: 4, h: 10,
        vx:  Math.sin(angle) * speed,
        vy:  Math.cos(angle) * speed,
        boss: true
      });
    }

    // Qモード（ハードモード）ラスボスの10秒サイクル：
    //  1〜6秒：左右に往復（3秒目・4秒目に3方向弾）／7秒目：前へ移動／
    //  8〜9秒：前に滞在／10秒目：元の位置へ戻る、をループ。
    function updateQFinalBoss(e) {
      if (e.lungePhase === "patrol") {
        e.x += e.moveDir * e.speed;
        if (e.x < 0) { e.x = 0; e.moveDir = 1; }
        else if (e.x + e.w > FIELD_W) { e.x = FIELD_W - e.w; e.moveDir = -1; }
        const elapsed = 60 * 6 - e.phaseTimer;   // patrol開始からの経過フレーム
        if (elapsed === 60 * 3 || elapsed === 60 * 4) fireFinalBossBullets(e);
        e.phaseTimer--;
        if (e.phaseTimer <= 0) { e.lungePhase = "lungeOut"; e.phaseTimer = e.lungeDur; } // 7秒目：1秒で前へ
      } else if (e.lungePhase === "lungeOut") {
        e.y += e.lungeStep;
        e.phaseTimer--;
        if (e.phaseTimer <= 0) { e.y = e.lungeTargetY; e.lungePhase = "lungeHold"; e.phaseTimer = 60 * 2; } // 8〜9秒：2秒滞在
      } else if (e.lungePhase === "lungeHold") {
        // 前に滞在（発射なし）
        e.phaseTimer--;
        if (e.phaseTimer <= 0) { e.lungePhase = "lungeBack"; e.phaseTimer = e.lungeDur; } // 10秒目：1秒で戻る
      } else {
        e.y -= e.lungeStep;
        e.phaseTimer--;
        if (e.phaseTimer <= 0) { e.y = e.homeY; e.lungePhase = "patrol"; e.phaseTimer = 60 * 6; }
      }
    }

    // ===== 更新 =====
    function updatePlayer() {
      if (keys["ArrowLeft"]  || keys["KeyA"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
      if (keys["ArrowUp"]    || keys["KeyW"]) player.y -= player.speed;
      if (keys["ArrowDown"]  || keys["KeyS"]) player.y += player.speed;

      const pad = readGamepad();
      if (pad) {
        const dead = 0.25;
        if (Math.abs(pad.lx) > dead) player.x += pad.lx * player.speed;
        if (Math.abs(pad.ly) > dead) player.y += pad.ly * player.speed;
        if (pad.dpadLeft)  player.x -= player.speed;
        if (pad.dpadRight) player.x += player.speed;
        if (pad.dpadUp)    player.y -= player.speed;
        if (pad.dpadDown)  player.y += player.speed;
      }

      // スマホ：傾きで操作。左右は傾き量で移動、前後は傾き角で位置を決める。
      if (isTouchDevice && tiltActive) {
        const { steer, pitchBack } = readTilt();
        player.x += steer * player.speed;
        const nearY = FIELD_H - player.h;        // 最も手前
        const farLimit = FIELD_H * 0.30;         // 前へ出せる限界（奥に行き過ぎない）
        player.y = nearY - pitchBack * (nearY - farLimit);
      }

      player.x = Math.max(0, Math.min(FIELD_W  - player.w, player.x));
      player.y = Math.max(0, Math.min(FIELD_H - player.h, player.y));

      if (player.fireCooldown > 0) player.fireCooldown--;

      const wantShootKeyboard = keys["Space"] || keys["KeyJ"];
      const wantShootPad = pad && pad.shoot;
      const wantShootTouch = isTouchDevice && touchFiring;

      if ((wantShootKeyboard || wantShootPad || wantShootTouch) && player.fireCooldown === 0) {
        firePlayerShots();
        player.fireCooldown = 8;
      }
      if (powerUpActive) {
        powerUpTimer--;
        if (powerUpTimer <= 0) powerUpActive = false;
      }

      if (doubleShotActive && score >= doubleShotEndScore) {
        doubleShotActive = false;
      }
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y + b.h < 0 || b.y > FIELD_H ||
            b.x + b.w < 0 || b.x > FIELD_W) {
          removeMesh3D(b);
          bullets.splice(i, 1);
        }
      }
    }

    function updateEnemyBullets() {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx;
        b.y += b.vy;

        if (b.y > FIELD_H || b.x + b.w < 0 || b.x > FIELD_W) {
          removeMesh3D(b);
          enemyBullets.splice(i, 1);
          continue;
        }
        // 超初心者無敵モード中は自機に当たり判定がなく、弾はすり抜ける（死なない）
        if (!superBeginnerMode && rectHit({x: player.x, y: player.y, w: player.w, h: player.h}, b)) {
          // デモプレイの被弾は「連続ゲームオーバー」に数えない
          if (!gameOver && !demoMode) consecutiveGameOvers++;
          gameOver = true;
          playSound(playerExplodeSound);
          createExplosion(player.x + player.w/2, player.y + player.h/2, false);
          removeMesh3D(b);
          enemyBullets.splice(i, 1);
        }
      }
    }

    function updateEnemies() {
      if (!finalMode) {
        enemySpawnTimer--;
        if (enemySpawnTimer <= 0) {
          if (tunnelMode) {
            spawnQWave();       // 編隊3機（平均出現数は通常と同程度）
            enemySpawnTimer = 120;
          } else {
            spawnEnemy();
            enemySpawnTimer = 40;
          }
        }

        if (score > 500 && score < 1650) {
          hardTwinSpawnTimer--;
          if (hardTwinSpawnTimer <= 0) {
            spawnHardTwin();
            hardTwinSpawnTimer = randInt(60 * 7, 60 * 12);
          }
        }

        // Qモードは蛇行敵を300点から出し、出現間隔も半分にして2倍に。
        if (tunnelMode ? (score >= 300) : (score > 900)) {
          zigzagSpawnTimer--;
          if (zigzagSpawnTimer <= 0) {
            spawnZigzagEnemy();
            zigzagSpawnTimer = tunnelMode ? randInt(90, 150) : randInt(60 * 3, 60 * 5);
          }
        }
      } else {
        if (!finalBossSpawned) {
          if (finalDelayFrames > 0) {
            finalDelayFrames--;
          } else {
            spawnFinalBoss();
            finalBossSpawned = true;
          }
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        if (e.type === "trail_enemy") {
          e.y += e.speed;

          e.trail.push({ x: e.x + e.w/2, y: e.y + e.h/2, life: 240 });
          for (let tt = e.trail.length - 1; tt >= 0; tt--) {
            e.trail[tt].life--;
            if (e.trail[tt].life <= 0) e.trail.splice(tt, 1);
          }

          e.shotTimer--;
          if (e.shotTimer <= 0) {
            enemyBullets.push({ x: e.x + e.w/2 - 2, y: e.y + e.h, w: 4, h: 10, vx: 0, vy: 5 });
            e.shotTimer = 120;
          }

          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.type === "zigzag_enemy") {
          e.y += e.speed;

          e.zigPhase += 0.08;
          e.x = e.baseX + Math.sin(e.zigPhase) * e.zigAmp;

          if (e.x < 0) { e.x = 0; e.baseX = e.x; }
          if (e.x + e.w > FIELD_W) { e.x = FIELD_W - e.w; e.baseX = e.x; }

          e.shotTimer--;
          if (e.shotTimer <= 0) {
            const speed = 5;
            const ang = Math.PI / 6;
            const cx = e.x + e.w/2 - 2;
            const cy = e.y + e.h/2;

            enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: -Math.sin(ang) * speed, vy: Math.cos(ang) * speed });
            enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx:  Math.sin(ang) * speed, vy: Math.cos(ang) * speed });
            e.shotTimer = 120;
          }

          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.type === "hard_twin") {
          e.y += e.speed;
          if (e.hitFlash > 0) e.hitFlash--;
          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
          }
          continue;
        }

        if (e.isMissile) {
          e.y += e.speed;

          if (Array.isArray(e.trail)) {
            e.trail.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, life: 240 });
            for (let t = e.trail.length - 1; t >= 0; t--) {
              e.trail[t].life--;
              if (e.trail[t].life <= 0) e.trail.splice(t, 1);
            }
            if (e.trail.length > 260) e.trail.splice(0, e.trail.length - 260);
          }

          if (e.y > FIELD_H) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.isFinalBoss && e.qBoss) {
          updateQFinalBoss(e);
        } else if (e.isFinalBoss) {
          if (e.lungePhase === "patrol") {
            // 8秒間、左右（端から端）に往復しながら3方向の弾を発射
            e.x += e.moveDir * e.speed;
            if (e.x < 0) {
              e.x = 0;
              e.moveDir = 1;
            } else if (e.x + e.w > FIELD_W) {
              e.x = FIELD_W - e.w;
              e.moveDir = -1;
            }

            e.shotTimer--;
            if (e.shotTimer <= 0) {
              fireFinalBossBullets(e);
              e.shotTimer = 180;
            }

            e.phaseTimer--;
            if (e.phaseTimer <= 0) { e.lungePhase = "lungeOut"; e.phaseTimer = 120; }
          } else if (e.lungePhase === "lungeOut") {
            // 2秒かけて前へ出てくる
            e.y += e.lungeStep;
            e.phaseTimer--;
            if (e.phaseTimer <= 0) {
              e.y = e.lungeTargetY;
              e.lungePhase = "lungeHold";
              e.phaseTimer = 60;        // 前で1秒とどまる
              e.lungeHoldShotTimer = 0; // 直後に1発目
            }
          } else if (e.lungePhase === "lungeHold") {
            // 前へ出た位置で1秒とどまり、その間は速度50%ダウンの3方向弾を発射
            e.lungeHoldShotTimer--;
            if (e.lungeHoldShotTimer <= 0) {
              fireFinalBossBullets(e, 0.5);
              e.lungeHoldShotTimer = 30;
            }
            e.phaseTimer--;
            if (e.phaseTimer <= 0) { e.lungePhase = "lungeBack"; e.phaseTimer = 120; }
          } else {
            // 2秒かけて元の位置（後ろ）へ戻る
            e.y -= e.lungeStep;
            e.phaseTimer--;
            if (e.phaseTimer <= 0) {
              e.y = e.homeY;
              e.lungePhase = "patrol";
              e.phaseTimer = 60 * 8; // 次のラッシュまで再び8秒
            }
          }
        } else {
          e.y += e.speed;
          if (!e.isBoss && !e.isFinalBoss && !e.isMissile && Array.isArray(e.trail)) {
            e.trail.push({ x: e.x + e.w/2, y: e.y + e.h/2, life: 240 });
            for (let t = e.trail.length - 1; t >= 0; t--) {
              e.trail[t].life--;
              if (e.trail[t].life <= 0) e.trail.splice(t, 1);
            }
            if (e.trail.length > 260) e.trail.splice(0, e.trail.length - 260);
          }

          if (e.y > FIELD_H) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }

          if (e.isBoss && !e.isFinalBoss) {
            if (typeof e.shotTimer !== "number") e.shotTimer = 180;
            e.shotTimer--;
            if (e.shotTimer <= 0) {
              const speed = 6;
              const y0 = e.y + e.h;
              enemyBullets.push({ x: e.x + e.w * 0.35, y: y0, w: 4, h: 10, vx: 0, vy: speed });
              enemyBullets.push({ x: e.x + e.w * 0.65, y: y0, w: 4, h: 10, vx: 0, vy: speed });
              e.shotTimer = 180;
            }
          }

          if (e.isShooter && !e.isBoss && e.shotsLeft > 0) {
            e.shotTimer--;
            if (e.shotTimer <= 0) {
              fireEnemyBulletsFromEnemy(e);
              e.shotsLeft = 0;
            }
          }
        }

        // 超初心者無敵モード中は敵と接触しても死なない（当たり判定なし）
        // ボス（中ボス・ラスボス）は見た目に合わせた薄い判定
        const playerTarget = e.isBoss ? bossHitBox(e) : e;
        if (!superBeginnerMode && rectHit(player, playerTarget)) {
          if (!gameOver && !demoMode) consecutiveGameOvers++;
          gameOver = true;
          playSound(playerExplodeSound);
          createExplosion(player.x + player.w/2, player.y + player.h/2, false);
        }
      }
    }

    function updateStarsPower() {
      for (let i = powerStars.length - 1; i >= 0; i--) {
        const s = powerStars[i];
        s.y += s.speed;
        if (s.y > FIELD_H) {
          removeMesh3D(s);
          powerStars.splice(i, 1);
          continue;
        }
        const rect = { x: s.x, y: s.y, w: s.size, h: s.size };
        if (rectHit(player, rect)) {
          powerUpActive = true;
          powerUpTimer  = 60 * 8;
          removeMesh3D(s);
          powerStars.splice(i, 1);
          playSound(starSound);
        }
      }
    }

    function updateDoubleShotStars() {
      if (score >= doubleShotEndScore) {
        for (const s of doubleShotStars) removeMesh3D(s);
        doubleShotStars.length = 0;
        return;
      }
      for (let i = doubleShotStars.length - 1; i >= 0; i--) {
        const s = doubleShotStars[i];
        s.y += s.speed;
        if (s.y > FIELD_H) {
          removeMesh3D(s);
          doubleShotStars.splice(i, 1);
          continue;
        }
        const rect = { x: s.x, y: s.y, w: s.size, h: s.size };
        if (rectHit(player, rect)) {
          doubleShotActive = true;
          removeMesh3D(s);
          doubleShotStars.splice(i, 1);
          playSound(starSound);
        }
      }
    }

    // ボス（中ボス・ラスボス）の当たり判定を「見た目のモデル」に合わせた箱にする。
    // フィールドのy(奥行き)は3D空間ではDEPTH_SCALE倍に引き伸ばされるため、
    // 箱のhをそのまま判定に使うと、見た目より約3.4倍も奥行きの深い
    // 判定になり、機体が見た目で届く前に自機がやられたり、自機弾が機体の
    // ずっと手前で消えたりする。見た目の奥行き(h/DEPTH_SCALE)に合わせた
    // 薄い箱を機体中心に置くことで、見た目と判定を一致させる。
    function bossHitBox(e) {
      const cy = e.y + e.h / 2;
      const depth = e.h / DEPTH_SCALE; // 見た目の奥行き（フィールドy換算）
      return { x: e.x, y: cy - depth / 2, w: e.w, h: depth };
    }

    function handleCollisions() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        // ボス（中ボス・ラスボス）は見た目に合わせた薄い判定を使う（自機弾・自機接触とも）
        const bulletTarget = e.isBoss ? bossHitBox(e) : e;
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (rectHit(bulletTarget, b)) {
            const exX = e.x + e.w / 2;
            const exY = e.y + e.h / 2;

            removeMesh3D(b);
            bullets.splice(j, 1);

            startBgmIfReady();

            if (e.isFinalBoss) {
              e.hp--;
              if (e.hp <= 0) {
                playSound(playerExplodeSound);
                removeMesh3D(e);
                startClearSequence(exX, exY);
              }
              break;
            }

            if (e.type === "hard_twin") {
              if (typeof e.hp !== "number") e.hp = 35;
              e.hp--;
              e.hitFlash = 6;
              if (e.hp <= 0) {
                removeMesh3D(e);
                enemies.splice(i, 1);
                score += 40;
                playSound(enemyExplodeSound);
                createExplosion(exX, exY, true);
                handleScoreEvents();
                if (!finalMode) checkBossSpawn();
                tryStartFinalMode();
              }
              break;
            }

            if (e.isBoss) {
              if (typeof e.hp !== "number") e.hp = 20;
              e.hp--;
              if (e.hp <= 0) {
                removeMesh3D(e);
                enemies.splice(i, 1);
                score += 10;
                playSound(playerExplodeSound);
                createExplosion(exX, exY, true);
                handleScoreEvents();
                if (!finalMode) checkBossSpawn();
                tryStartFinalMode();
              }
            } else if (e.isMissile) {
              removeMesh3D(e);
              enemies.splice(i, 1);
              score += 20;
              playSound(enemyExplodeSound);
              createExplosion(exX, exY, false);
              handleScoreEvents();
              if (!finalMode) checkBossSpawn();
              tryStartFinalMode();
            } else {
              removeMesh3D(e);
              enemies.splice(i, 1);
              score += 10;
              playSound(enemyExplodeSound);
              createExplosion(exX, exY, false);
              handleScoreEvents();
              if (!finalMode) checkBossSpawn();
              tryStartFinalMode();
            }
            break;
          }
        }
      }
    }

    function rectHit(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    // ===== 通常の爆発（敵・ミサイル用） =====
    const explosionPatterns = [
      { maxLife: 26, radiusScale: 1.0,
        rings: [ { r: 0.35, color: "#ff3300", alpha: 0.9 }, { r: 0.7,  color: "#ff9900", alpha: 0.7 }, { r: 1.0,  color: "#ffdd55", alpha: 0.5 } ] },
      { maxLife: 28, radiusScale: 1.1,
        rings: [ { r: 0.25, color: "#ffffcc", alpha: 0.9 }, { r: 0.55, color: "#ffdd33", alpha: 0.75 }, { r: 0.8,  color: "#ccff66", alpha: 0.6 }, { r: 1.0,  color: "#99ff66", alpha: 0.4 } ] },
      { maxLife: 24, radiusScale: 0.9,
        rings: [ { r: 0.3,  color: "#ff4444", alpha: 0.9 }, { r: 0.6,  color: "#ffee66", alpha: 0.7 }, { r: 0.9,  color: "#99ff66", alpha: 0.55 }, { r: 1.15, color: "#66ffee", alpha: 0.35 } ] },
      { maxLife: 30, radiusScale: 1.2,
        rings: [ { r: 0.2,  color: "#ffcc33", alpha: 1.0 }, { r: 0.5,  color: "#ffff66", alpha: 0.8 }, { r: 0.85, color: "#ff9933", alpha: 0.6 }, { r: 1.1,  color: "#99ff66", alpha: 0.4 } ] }
    ];

    function createExplosion(x, y, big) {
      const patternIndex = (Math.random() * explosionPatterns.length) | 0;
      const pattern = explosionPatterns[patternIndex];

      const baseSmall = 28;
      const baseRadius = big ? baseSmall * 8 : baseSmall;

      explosions.push({
        x, y, life: 0, patternIndex,
        maxRadius: baseRadius * pattern.radiusScale
      });
    }

    function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const ex = explosions[i];
        const pattern = explosionPatterns[ex.patternIndex];

        ex.life++;
        const totalLife = pattern.maxLife * 2;
        if (ex.life >= totalLife) {
          removeMesh3D(ex);
          explosions.splice(i, 1);
        }
      }
    }

    // ===== スコア関連フラグリセット =====
    function resetScoreFlags() {
      for (const k in missileSpawned) delete missileSpawned[k];
      for (const k in starSpawned) delete starSpawned[k];
      for (const k in doubleShotStarSpawned) delete doubleShotStarSpawned[k];
    }

    function clearAllMeshes() {
      for (const b of bullets) removeMesh3D(b);
      for (const b of enemyBullets) removeMesh3D(b);
      for (const e of enemies) removeMesh3D(e);
      for (const s of powerStars) removeMesh3D(s);
      for (const s of doubleShotStars) removeMesh3D(s);
      for (const ex of explosions) removeMesh3D(ex);
      removeAllTrails();
    }

    function startGame() {
      clearAllMeshes();
      bullets.length = 0;
      enemies.length = 0;
      enemyBullets.length = 0;
      explosions.length = 0;
      powerStars.length = 0;
      doubleShotStars.length = 0;
      resetScoreFlags();
      powerUpActive = false;
      powerUpTimer  = 0;
      doubleShotActive = false;

      score = 0;
      nextBossScore = 300;
      enemySpawnTimer = 30;
      trailSpawnTimer = randInt(60 * 5, 60 * 10);
      hardTwinSpawnTimer = randInt(60 * 6, 60 * 12);
      zigzagSpawnTimer = randInt(60 * 6, 60 * 12);
      player.x = (FIELD_W - player.w) / 2;
      player.y = FIELD_H - 80;
      player.fireCooldown = 0;
      gameOver = false;
      gameStarted = true;
      gameCleared = false;

      tunnelMode = false; // デザインチェンジは毎ゲーム オフから

      finalMode = false;
      finalDelayFrames = 0;
      finalBossSpawned = false;

      clearPhase = 0;
      clearFrame = 0;
      finalBigExplosion = null;
      clearFlashTimer = 0;
    }

    function backToTitle() {
      clearAllMeshes();
      bullets.length = 0;
      enemies.length = 0;
      enemyBullets.length = 0;
      explosions.length = 0;
      powerStars.length = 0;
      resetScoreFlags();
      doubleShotActive = false;

      score = 0;
      nextBossScore = 300;
      enemySpawnTimer = 30;
      trailSpawnTimer = randInt(60 * 5, 60 * 10);
      hardTwinSpawnTimer = randInt(60 * 6, 60 * 12);
      zigzagSpawnTimer = randInt(60 * 6, 60 * 12);
      player.fireCooldown = 0;

      finalMode = false;
      finalDelayFrames = 0;
      finalBossSpawned = false;

      clearPhase = 0;
      clearFrame = 0;
      finalBigExplosion = null;
      clearFlashTimer = 0;

      gameStarted = false;
      gameOver = false;
      gameCleared = false;

      // タイトルの自機は定位置（中央下）に戻す（デモで死んだ位置のまま残さない）
      player.x = (FIELD_W - player.w) / 2;
      player.y = FIELD_H - 80;

      // タイトルに戻ったら放置タイマーを仕切り直す（5秒後にデモ開始）
      demoMode = false;
      titleIdleStartMs = performance.now();
    }

    /* =========================================================================
       ここから Three.js による3D描画レイヤー
       ゲームロジック（座標・当たり判定・スコア等）は上と全く同じ2D平面上で計算し、
       描画だけを立体（ボクセル押し出し）に変換して表示する。
       ========================================================================= */

    // 影は「地面から浮いて見える」原因になるため一旦オフ。この定数をtrueに戻せば復活する。
    const ENABLE_SHADOWS = false;
    // 地面・空・フォグを同じ色にして、地平線が浮き上がって見えないようにする（宇宙空間の一体感）
    const SPACE_COLOR = 0x000000;

    const webglCanvas = document.getElementById("webgl");
    // スマホはGPUが弱く、高解像度＋アンチエイリアスだと処理落ちして動きが重くなる。
    // タッチ端末では描画解像度を等倍(760×640)に抑え、MSAAも切る
    // （小さい画面に縮小表示されるため見た目の差はほぼ出ない）。
    const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, antialias: !isTouchDevice });
    renderer.setSize(CANVAS_W, CANVAS_H, false);
    renderer.setPixelRatio(isTouchDevice ? 1 : Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = ENABLE_SHADOWS;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SPACE_COLOR);
    // 出現ラインを遠くへ押し出す分、そこがフォグで消えてしまわないよう可視距離も広げる
    // フォグは使わない。かけると出現ライン付近の敵が黒背景に沈んで見えず、
    // ラインを越えて手前に来てから見え始める＝「線から出てこない」ように見えるため。
    // 出現時のモヤ感はライン上の縦板（spawnGlow）のモヤが担当する。
    scene.fog = null;

    // スターフォックス的な、自機の斜め後ろ上空からの追従（チェイス）カメラ。
    // 自機・敵・弾すべてが同じ座標変換（toWorldX/toDepthZ）を使うことで、
    // 自機から出る弾の発射位置が自機の見た目とズレないようにする。
    // 元のyは「奥から手前への進行度」としてそのまま奥行き（Z）に変換するので、
    // 自機の上下移動＝奥行き方向（前後）の移動になる。
    const BASE_ALT     = 45;    // 自機・敵が飛ぶ標準高度（固定）
    // 横方向の「位置」だけを圧縮して画面に収める（当たり判定の実サイズとズレて
    // 見えないよう、各機体のジオメトリ幅そのものは圧縮しない＝見た目通りに当たる）
    const GLOBAL_X_SCALE = 0.75;
    // yの奥行き進行を実際の奥行きZに変換する係数。大きいほど敵の出現位置が遠く
    // （画面奥＝上部）に見え、画面全体を使って手前まで進んでくるようになる。
    const DEPTH_SCALE   = 3.4;

    const camera = new THREE.PerspectiveCamera(56, CANVAS_W / CANVAS_H, 1, 6000);
    function layoutCamera() {
      camera.aspect = CANVAS_W / CANVAS_H;
      camera.updateProjectionMatrix();
    }
    layoutCamera();
    camera.position.set(0, BASE_ALT + 180, 220);
    camera.up.set(0, 1, 0);
    // 見下ろし角をやや強めて、地平線（＝敵出現ライン）が画面の上の方に来るようにする
    camera.lookAt(0, BASE_ALT - 45, -900);

    const hemiLight = new THREE.HemisphereLight(0x8fb0ff, 0x0a0a12, 0.45);
    scene.add(hemiLight);

    // 自機付近（近〜中距離のレーン）を中心に影を落とす
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.9);
    sunLight.position.set(-250, 600, 450);
    sunLight.target.position.set(0, BASE_ALT, -600);
    sunLight.castShadow = ENABLE_SHADOWS;
    sunLight.shadow.mapSize.set(1024, 1024);
    sunLight.shadow.camera.left = -500;
    sunLight.shadow.camera.right = 500;
    sunLight.shadow.camera.top = 900;
    sunLight.shadow.camera.bottom = -900;
    sunLight.shadow.camera.near = 10;
    sunLight.shadow.camera.far = 2200;
    sunLight.shadow.bias = -0.0015;
    scene.add(sunLight);
    scene.add(sunLight.target);

    // 反対側からの弱いフィルライト（側面が真っ黒に潰れないように）
    const fillLight = new THREE.DirectionalLight(0x6699ff, 0.35);
    fillLight.position.set(300, 200, 200);
    fillLight.target.position.set(0, BASE_ALT, -600);
    scene.add(fillLight);
    scene.add(fillLight.target);

    // 座標変換：2Dゲーム座標(x, y) -> 3Dワールド座標
    // 自機・敵・弾・演出すべてが同じ変換を使う（自機だけ特別扱いすると、
    // そこから出る弾の発射位置が自機の見た目とズレてしまうため）。
    function toWorldX(x) { return (x - FIELD_W / 2) * GLOBAL_X_SCALE; }
    function toDepthZ(y) { return (y - FIELD_H) * DEPTH_SCALE; }

    // ===== TRON風グリッド地面 =====
    // 白い罫線（方眼紙状、大きめの正方形）だけを焼き込んだテクスチャを作り、
    // 実際の色はマテリアルのcolorで毎フレーム着色する（時間経過で色が変わる
    // サイバーパンク演出のため、テクスチャ自体を再生成せずに済むようにする）。
    function buildGridLineTexture(opts = {}) {
      const { cellPx = 171, lineWidth = 2, glow = 3, repeatX = 4, repeatY = 8 } = opts;
      const size = 1024;
      const cvs = document.createElement("canvas");
      cvs.width = size; cvs.height = size;
      const c = cvs.getContext("2d");
      c.fillStyle = "#000000";
      c.fillRect(0, 0, size, size);
      c.strokeStyle = "#ffffff";
      c.lineWidth = lineWidth;
      c.shadowColor = "#ffffff";
      c.shadowBlur = glow;
      for (let x = 0; x <= size; x += cellPx) {
        c.beginPath(); c.moveTo(x, 0); c.lineTo(x, size); c.stroke();
      }
      for (let y = 0; y <= size; y += cellPx) {
        c.beginPath(); c.moveTo(0, y); c.lineTo(size, y); c.stroke();
      }
      const tex = new THREE.CanvasTexture(cvs);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(repeatX, repeatY);
      // 奥（浅い角度）で線がぼやけて潰れないように異方性フィルタを効かせる。
      // 最大値はスマホGPUには重いので、タッチ端末では4に抑える
      const maxAniso = renderer.capabilities.getMaxAnisotropy();
      tex.anisotropy = isTouchDevice ? Math.min(4, maxAniso) : maxAniso;
      // sRGB指定がないと中間調が明るく持ち上がり、線の縁が太くぼやけて見える
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    // ===== 構成の原則 =====
    // 「黒背景の格子柄の地上」があり、その地面は敵出現ライン（toDepthZ(0)）で
    // 物理的に終わる。地面の遠端＝地平線＝敵出現ラインが構造的に必ず一致する。
    // それより上（奥）はすべて空（スクリーン背景のグラデーション）。
    const SPAWN_LINE_Z = toDepthZ(0);  // 敵が出現するy=0に対応する奥行き＝地平線
    const GROUND_NEAR_Z = 400;         // 地面の手前端（カメラより手前まで）
    // 地面幅は地平線の距離でも画面幅を確実に覆うくらい広く取る。狭いと地面の左右の
    // 端（側辺）が遠近法で収束して見え、地平線が三角形に「割れて」見えてしまう。
    const GROUND_W = 9100;
    const GROUND_D = GROUND_NEAR_Z - SPAWN_LINE_Z;
    const GROUND_REPEAT_X = 14;
    // 格子のマスが正方形になるよう、奥行き方向の繰り返し数は幅のマスサイズから算出
    const GROUND_REPEAT_Y = GROUND_D / (GROUND_W / GROUND_REPEAT_X);
    const groundGeo = new THREE.PlaneGeometry(GROUND_W, GROUND_D, 1, 1);
    const groundMat = new THREE.MeshBasicMaterial({
      map: buildGridLineTexture({ repeatX: GROUND_REPEAT_X, repeatY: GROUND_REPEAT_Y }),
      color: 0xffffff,
      // フォグをかけると遠端（＝地平線＝敵出現ライン）付近の格子が黒く潰れて
      // 「見えている地平線」が実際の地面の端より手前に来てしまう。
      // 格子は遠端までくっきり見せたいのでフォグの影響を受けない。
      fog: false
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    // 手前端GROUND_NEAR_Z〜遠端SPAWN_LINE_Z（＝敵出現ライン）を正確に覆う位置に置く
    ground.position.set(0, 0, (GROUND_NEAR_Z + SPAWN_LINE_Z) / 2);
    scene.add(ground);

    // ===== デザインチェンジ：格子のトンネル（ゲーム中にQキーで切り替え） =====
    // 地表(床)に加えて、天井と左右の壁も格子で囲む。ただし手前(カメラ付近)は高く、
    // 奥(地平線＝敵出現ライン)へ行くほど天井・壁の高さが下がって closes していき、
    // 最奥は「横長で隙間のほぼない一本の線」になる。敵はその線から出現する。
    // 天井・壁とも地表と同じ大きさの格子で、奥から手前へ地表と同じくスクロールする。
    let tunnelMode = false;
    const TUNNEL_TILE = GROUND_W / GROUND_REPEAT_X;   // 格子1タイルのワールドサイズ（地表と同じ）
    const WALL_X = toWorldX(FIELD_W) + 10;            // 自機移動範囲の少し外側（左は -WALL_X）
    const TUNNEL_NEAR_Z = GROUND_NEAR_Z;              // 手前端（カメラより手前）
    const TUNNEL_FAR_Z  = SPAWN_LINE_Z;              // 最奥＝地平線＝敵出現ライン
    const TUNNEL_NEAR_Y = 420;                        // 手前の天井の高さ（カメラより十分上）
    const TUNNEL_FAR_Y  = 12;                         // 最奥の高さ（ほぼ0＝横長の細い線）
    const TUNNEL_DEPTH  = TUNNEL_NEAR_Z - TUNNEL_FAR_Z;

    const HW = WALL_X;
    const tlerp = (a, b, t) => a + (b - a) * t;
    // 天井/壁の高さプロファイル。手前(t=0)は高く、奥(t=1＝敵の線)へ曲線的に集約して
    // 最奥はほぼ0（横長の細い線）。
    function tunnelTopY(t) {
      return TUNNEL_FAR_Y + (TUNNEL_NEAR_Y - TUNNEL_FAR_Y) * Math.pow(1 - t, 1.8);
    }
    // 断面内位置s(0..1)・奥行きt(0..1)から、各面のワールド座標を返す。
    // ceil: 上面（sで左右）／left,right: 壁（sで下→上）。
    function tunnelPoint(surf, s, t) {
      const z = tlerp(TUNNEL_NEAR_Z, TUNNEL_FAR_Z, t);
      const ty = tunnelTopY(t);
      if (surf === "ceil")  return [tlerp(-HW, HW, s), ty, z];
      if (surf === "left")  return [-HW, s * ty, z];
      return [HW, s * ty, z]; // right
    }

    const CEIL_S = [0, 0.25, 0.5, 0.75, 1.0]; // 天井の縦（奥行き方向）ライン位置
    const WALL_S = [0, 0.34, 0.67, 1.0];      // 壁の縦（奥行き方向）ライン位置（高さ）
    const TUNNEL_SURFS = [
      { surf: "ceil",  sList: CEIL_S },
      { surf: "left",  sList: WALL_S },
      { surf: "right", sList: WALL_S }
    ];
    const LON_SAMPLES = 44;   // 奥行きラインの分割（滑らかさ）
    const NR = 22;            // 移動する横リング（縦線）の本数
    const RING_SPEED = 1.4;   // リングが手前へ流れる速さ（本/秒）
    const ND = 10;            // 塗り面の奥行き分割数

    const tunnelGroup = new THREE.Group();
    tunnelGroup.visible = false;
    scene.add(tunnelGroup);
    function applyTunnelVisible(v) { tunnelGroup.visible = v; }

    // (1) 奥行きへ伸びる「縦ライン」：滑らかで静止。手前↔奥の動きはリング側で演出。
    function buildTunnelLon() {
      const pos = [];
      for (const { surf, sList } of TUNNEL_SURFS) {
        for (const s of sList) {
          for (let i = 0; i < LON_SAMPLES; i++) {
            const A = tunnelPoint(surf, s, i / LON_SAMPLES);
            const B = tunnelPoint(surf, s, (i + 1) / LON_SAMPLES);
            pos.push(A[0],A[1],A[2], B[0],B[1],B[2]);
          }
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pos), 3));
      const mat = new THREE.LineBasicMaterial({ color: 0xffffff, fog: false });
      const seg = new THREE.LineSegments(geo, mat);
      tunnelGroup.add(seg);
      return { seg, mat };
    }
    const tunnelLon = buildTunnelLon();

    // (2) 「横リング（縦線）」：奥→手前へ流れて動きを出す。毎フレーム位置を更新。
    const tunnelRingGeo = new THREE.BufferGeometry();
    tunnelRingGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(NR * 8 * 3), 3));
    const tunnelRingMat = new THREE.LineBasicMaterial({ color: 0xffffff, fog: false });
    const tunnelRings = new THREE.LineSegments(tunnelRingGeo, tunnelRingMat);
    tunnelGroup.add(tunnelRings);
    let ringPhase = 0;
    function updateTunnelRings(dt) {
      ringPhase += dt * RING_SPEED;
      const arr = tunnelRingGeo.attributes.position.array;
      let o = 0;
      for (let k = 0; k < NR; k++) {
        const t = (((k - ringPhase) % NR) + NR) % NR / NR;
        const z = tlerp(TUNNEL_NEAR_Z, TUNNEL_FAR_Z, t), ty = tunnelTopY(t);
        // 断面の長方形（上・下・左・右）を線分ペアで
        const TL=[-HW,ty,z], TR=[HW,ty,z], BL=[-HW,0,z], BR=[HW,0,z];
        const segs=[TL,TR, BL,BR, TL,BL, TR,BR];
        for (const p of segs) { arr[o++]=p[0]; arr[o++]=p[1]; arr[o++]=p[2]; }
      }
      tunnelRingGeo.attributes.position.needsUpdate = true;
    }

    // (3) 面の塗り：透けない不透明なベタ塗り。格子線が手前に出るよう polygonOffset で
    //  塗り面をわずかに奥へ。天井・左右壁とも地表と同じく黒（背景色）。
    function buildSurfaceFill(surf, sList) {
      const pos = [];
      for (let si = 0; si < sList.length - 1; si++) {
        for (let j = 0; j < ND; j++) {
          const s0 = sList[si], s1 = sList[si + 1];
          const t0 = j / ND, t1 = (j + 1) / ND;
          const A=tunnelPoint(surf,s0,t0), B=tunnelPoint(surf,s1,t0), C=tunnelPoint(surf,s1,t1), D=tunnelPoint(surf,s0,t1);
          pos.push(A[0],A[1],A[2], B[0],B[1],B[2], C[0],C[1],C[2],  A[0],A[1],A[2], C[0],C[1],C[2], D[0],D[1],D[2]);
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pos), 3));
      return geo;
    }
    const ceilFillMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, fog: false, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 });
    const wallFillMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, fog: false, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 });
    tunnelGroup.add(new THREE.Mesh(buildSurfaceFill("ceil",  CEIL_S), ceilFillMat));
    tunnelGroup.add(new THREE.Mesh(buildSurfaceFill("left",  WALL_S), wallFillMat));
    tunnelGroup.add(new THREE.Mesh(buildSurfaceFill("right", WALL_S), wallFillMat));

    // 毎フレーム更新（tunnelMode表示中に呼ぶ）
    let tunnelLastMs = performance.now();
    function updateTunnel() {
      const now = performance.now();
      const dt = Math.min(0.1, (now - tunnelLastMs) / 1000);
      tunnelLastMs = now;
      updateTunnelRings(dt);
    }
    const tunnelLineMats = [tunnelLon.mat, tunnelRingMat];

    // 地面の遠端（＝地平線＝敵出現ライン）が画面のどの高さに映るかを求めておく。
    // 空側の演出（モヤ・グラデーション）はこの高さを基準に描く。
    // （初回レンダリング前なのでカメラ行列を明示的に更新してから投影する）
    camera.updateMatrixWorld();
    const horizonProbe = new THREE.Vector3(0, 0, SPAWN_LINE_Z);
    horizonProbe.project(camera);
    const HORIZON_FRACTION_FROM_BOTTOM = horizonProbe.y * 0.5 + 0.5;

    // 地平線より上の空間＝空。下（地平線ぎわ）は黒く、上へ行くほど気分色が
    // ついて明るくなるグラデーション。地平線のすぐ上には地平線ラインと同色の
    // モヤを少しだけ置く。気分色は時間経過で変化する（updateCyberColorsが
    // 毎フレーム再描画する。scene.backgroundとして使うスクリーン空間の背景）。
    const skyGradientCanvas = document.createElement("canvas");
    skyGradientCanvas.width = 2;
    skyGradientCanvas.height = 512;
    const skyGradientTex = new THREE.CanvasTexture(skyGradientCanvas);
    // sRGB指定がないとグラデーションが明るく持ち上がり、地平線ぎわの黒が
    // 灰色〜くすんだ色に化けて「黒から色へ」のグラデーションが感じられなくなる
    skyGradientTex.colorSpace = THREE.SRGBColorSpace;
    scene.background = skyGradientTex;
    // 空は「地平線＝黒、上へ行くほど色がつき明るくなる」を画面の空全体を使って
    // ゆるやかに描く（急な変化はベタ塗りに見えてグラデーションが感じられない）。
    // 地平線ぎわのモヤは空ではなく、地平線上に立てた縦板（spawnGlow）が担当する。
    function paintSkyGradient(topColor) {
      const c = skyGradientCanvas.getContext("2d");
      const h = skyGradientCanvas.height;
      const grad = c.createLinearGradient(0, h, 0, 0);
      const hf = Math.min(0.9, Math.max(0.02, HORIZON_FRACTION_FROM_BOTTOM));
      const mid = hf + (1 - hf) * 0.5;
      grad.addColorStop(0, "#000000");
      // 地平線の高さでは黒
      grad.addColorStop(hf, "#000000");
      // 空の中腹でもまだ暗め（色がつき始めたと分かる程度）
      grad.addColorStop(mid, `rgb(${topColor.r * 0.30 | 0},${topColor.g * 0.30 | 0},${topColor.b * 0.30 | 0})`);
      // 画面上端で最も明るい気分色
      grad.addColorStop(1, `rgb(${topColor.r},${topColor.g},${topColor.b})`);
      c.fillStyle = grad;
      c.fillRect(0, 0, skyGradientCanvas.width, h);
      skyGradientTex.needsUpdate = true;
    }

    // ===== サイバーパンク配色（グリッド線・出現ライン・空の気分色が時間経過で変化） =====
    // 線の色と空の色は必ず違う色になるよう、パレット上で2つずらして選ぶ。
    // 開始時：線＝青白、空の明るい部分＝#40e0d0（ターコイズ）
    const CYBER_PALETTE = [
      { r: 140, g: 210, b: 255 }, // 青白
      { r: 60,  g: 255, b: 140 }, // 緑
      { r: 64,  g: 224, b: 208 }, // ターコイズ #40e0d0
      { r: 255, g: 225, b: 60  }, // 黄色
      { r: 255, g: 70,  b: 60  }, // 赤
    ];
    const SKY_COLOR_OFFSET = 2;   // 空の色は線の色からパレット2つ先
    function paletteColorAt(phase) {
      const n = CYBER_PALETTE.length;
      const t = ((phase % n) + n) % n;
      const i0 = Math.floor(t);
      const i1 = (i0 + 1) % n;
      const f = t - i0;
      const c0 = CYBER_PALETTE[i0], c1 = CYBER_PALETTE[i1];
      return {
        r: Math.round(c0.r + (c1.r - c0.r) * f),
        g: Math.round(c0.g + (c1.g - c0.g) * f),
        b: Math.round(c0.b + (c1.b - c0.b) * f),
      };
    }
    // 30秒ごとに次の色へ切り替わり始め、15秒かけてゆっくり移り変わる
    // （30秒static＋15秒遷移＝45秒周期でパレットを1つ進める）
    const COLOR_HOLD_SEC = 30;
    const COLOR_TRANSITION_SEC = 15;
    const COLOR_CYCLE_SEC = COLOR_HOLD_SEC + COLOR_TRANSITION_SEC;
    // フレーム数基準だと高リフレッシュレートの画面（120Hz等）でサイクルが
    // 速く回ってしまうため、実時間（壁時計）基準で進める。
    const colorEpochMs = performance.now();
    function currentColorPhase() {
      const t = (performance.now() - colorEpochMs) / 1000;
      const cycleIndex = Math.floor(t / COLOR_CYCLE_SEC);
      const posInCycle = t - cycleIndex * COLOR_CYCLE_SEC;
      const localPhase = posInCycle < COLOR_HOLD_SEC
        ? 0
        : (posInCycle - COLOR_HOLD_SEC) / COLOR_TRANSITION_SEC;
      return cycleIndex + localPhase;
    }
    // 空グラデーションはcanvas再描画＋GPUへのテクスチャ転送を伴い毎フレームやると
    // 無駄に重いので、色が実際に変わったフレームだけ再描画する
    // （30秒の固定期間中は完全に同じ色なので大半のフレームをスキップできる）
    let lastSkyColorKey = "";
    function updateCyberColors() {
      const phase = currentColorPhase();
      const lineColor = paletteColorAt(phase);
      const skyColor = paletteColorAt(phase + SKY_COLOR_OFFSET);
      groundMat.color.setRGB(lineColor.r / 255, lineColor.g / 255, lineColor.b / 255);
      spawnGlowMat.color.setRGB(lineColor.r / 255, lineColor.g / 255, lineColor.b / 255);
      for (const m of tunnelLineMats) m.color.setRGB(lineColor.r / 255, lineColor.g / 255, lineColor.b / 255);
      const skyKey = skyColor.r + "," + skyColor.g + "," + skyColor.b;
      if (skyKey !== lastSkyColorKey) {
        lastSkyColorKey = skyKey;
        paintSkyGradient(skyColor);
      }
      updateEnemyBulletColor(lineColor);
      updateBossBulletColor(lineColor);
    }

    // ラスボス弾は基本「白」で目立たせる。ただし格子線が本当に白に近い
    // （全チャンネルが高い＝ほぼ無彩色で明るい）ときだけ、白同士で埋もれないよう
    // ピンクに切り替える。青白など「明るいが色みのある線」は白のまま
    // （白弾でも十分見えるため。以前は閾値が低すぎて青白でもピンクになっていた）。
    function updateBossBulletColor(lineColor) {
      const minC = Math.min(lineColor.r, lineColor.g, lineColor.b);
      if (minC > 210) {
        bossBulletMat.color.setHex(0xff3399); // ほぼ白の格子線 → ピンク
      } else {
        bossBulletMat.color.setHex(0xffffff); // 通常 → 白
      }
    }

    // 敵弾の色＝格子線の逆色（補色）を明るく補正した色。
    // 逆色そのままだと暗い色になる局面があるため、最大成分が255になるよう正規化した上で
    // さらに白へ30%寄せ、どの配色サイクルでも「絶対に明るい色」を保証する。
    // 逆色がほぼ黒（＝線がほぼ白）の場合は白にフォールバックする。
    function updateEnemyBulletColor(lineColor) {
      const inv = { r: 255 - lineColor.r, g: 255 - lineColor.g, b: 255 - lineColor.b };
      const maxC = Math.max(inv.r, inv.g, inv.b);
      let r, g, b;
      if (maxC < 60) {
        r = g = b = 255;
      } else {
        const k = 255 / maxC;
        const W = 0.3; // 白寄せの割合
        r = inv.r * k * (1 - W) + 255 * W;
        g = inv.g * k * (1 - W) + 255 * W;
        b = inv.b * k * (1 - W) + 255 * W;
      }
      enemyBulletMat.color.setRGB(r / 255, g / 255, b / 255);
    }

    // ===== 敵出現ライン（地平線）の発光演出 =====
    // 敵は常に同じ横線（y≈0、画面奥のほぼ固定の奥行き）から出現するため単調に見える。
    // 地平線＝敵出現ラインの位置に、カメラの方を向いた「縦の板」を立てて描く。
    // （水平の板だと真横から見ることになり、モヤがほぼ画面に映らない）
    // 内容：板の最下端＝地面の高さに、視認性の高い明るい横一直線（＝地平線）。
    // モヤは線の上側（空側）にだけ広がる。線より下（地面側）にモヤは一切描かない。
    // 色は白のみで焼き込み、実際の色相はマテリアルのcolor（updateCyberColorsが毎フレーム
    // 更新）で決める＝格子の線と同じ色に時間経過で変化する。ゲームロジック
    // （出現座標・当たり判定）には一切影響しない、純粋な見た目だけの追加要素。
    const SPAWN_GLOW_H = 300;        // 板の高さ＝線から上へのモヤの広がり
    const SPAWN_LINE_THICKNESS = 5;  // 横一直線の太さ（ワールド単位）
    function buildSpawnLineGlowTexture() {
      const W = 4, H = 512;  // 横方向は一様なので幅は最小限、縦方向を高解像度に
      const cvs = document.createElement("canvas");
      cvs.width = W; cvs.height = H;
      const c = cvs.getContext("2d");
      const img = c.createImageData(W, H);
      const data = img.data;
      for (let y = 0; y < H; y++) {
        // canvasの上端(y=0)がテクスチャ上端(v=1)＝板の上端
        const v = 1 - y / (H - 1);
        const worldY = v * SPAWN_GLOW_H; // 板ローカルの高さ（0＝板の下端＝地面＝線）
        let a;
        if (worldY <= SPAWN_LINE_THICKNESS) {
          // 板の最下端：地平線ライン。くっきり明るい横一直線
          a = 255;
        } else {
          // 線の上側だけ：はっきり分かるモヤ。上へ行くほど薄く消える
          const d = worldY - SPAWN_LINE_THICKNESS;
          a = Math.round(150 * Math.pow(Math.max(0, 1 - d / 240), 1.6));
        }
        for (let x = 0; x < W; x++) {
          const idx = (y * W + x) * 4;
          data[idx] = 255; data[idx + 1] = 255; data[idx + 2] = 255; data[idx + 3] = a;
        }
      }
      c.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(cvs);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    // SPAWN_LINE_Z（＝地面の遠端＝地平線）は地面セクションで定義済み。
    // 縦板をその奥行きに立てるので、構造的に敵出現位置と必ず一致する。
    // 地面と同じ幅（画面幅を確実に覆う広さ）にして、左右一直線のラインにする。
    const spawnGlowGeo = new THREE.PlaneGeometry(GROUND_W, SPAWN_GLOW_H, 1, 1);
    const spawnGlowMat = new THREE.MeshBasicMaterial({
      map: buildSpawnLineGlowTexture(), transparent: true, depthWrite: false, fog: false
    });
    const spawnGlow = new THREE.Mesh(spawnGlowGeo, spawnGlowMat);
    // 回転なし＝+Z（カメラ側）を向いた縦板。板の下端（＝線）がワールドの地面（y=0）に
    // ぴったり乗るよう、中心を板の高さの半分だけ持ち上げる。
    spawnGlow.position.set(0, SPAWN_GLOW_H / 2, SPAWN_LINE_Z);
    scene.add(spawnGlow);

    // 前進している感じを出すため、地面のグリッドをスクロールさせる。
    // このスクロール速度（ワールド座標換算）はクルーズ演出の空の星（Points）とも共有する。
    // offset.y を+方向に進めると、テクスチャ上の線は「奥（v=1側）→手前（v=0側）」に
    // 流れて見え、手前まで来たら奥へ戻って繰り返す＝奥から手前へ流れる前進感になる。
    // フレーム数基準だと描画レート（処理落ちや高リフレッシュレート）で体感速度が
    // 変わってしまうため、実時間基準で進める。
    const GROUND_SCROLL_UV_PER_SEC = 0.09; // 旧: 0.00075/フレーム(60fps換算)の2倍
    let spaceScrollZ = 0;
    let lastScrollMs = performance.now();
    function updateGroundScroll() {
      const now = performance.now();
      const dt = Math.min(0.1, (now - lastScrollMs) / 1000);
      lastScrollMs = now;
      const step = GROUND_SCROLL_UV_PER_SEC * dt;
      groundMat.map.offset.y += step;
      spaceScrollZ += step * (GROUND_D / GROUND_REPEAT_Y);
      updateCyberColors();
    }

    // ===== 3Dスター背景 =====
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(stars.length * 3);
    function syncStarGeometry() {
      // 背景の星は遠くの空にある装飾なので、レーンの奥行きとは別に
      // 広く・遠くへ引き伸ばして配置する（スカイボックス的な扱い）。
      // 地面の近層と同じ spaceScrollZ を使い、奥から手前へ流れて手前で
      // 奥へ戻る（地面と背景のスクロールが一体化する）ようにする。
      const DEPTH_RANGE = 3600;
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const depthPhase = (s.y / FIELD_H) * DEPTH_RANGE;
        const cycled = ((depthPhase - spaceScrollZ) % DEPTH_RANGE + DEPTH_RANGE) % DEPTH_RANGE;
        starPositions[i*3]   = toWorldX(s.x) * 2.4;
        starPositions[i*3+1] = 120 + s.size * 90;
        starPositions[i*3+2] = -600 - cycled;
      }
      starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
      starGeo.attributes.position.needsUpdate = true;
    }
    syncStarGeometry();
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: false });
    const starPoints = new THREE.Points(starGeo, starMat);
    // 通常プレイ・タイトルでは背景（scene.background）の星で表示するため非表示にし、
    // クリア後のクルーズ演出（星の中を飛び抜けていく特別なフェーズ）でのみ表示する。
    starPoints.visible = false;
    scene.add(starPoints);

    function buildStarShapeGeometry(points, outerR, innerR, thickness) {
      const shape = new THREE.Shape();
      for (let i = 0; i < points; i++) {
        const angA = (Math.PI * 2 / points) * i - Math.PI / 2;
        const angB = angA + Math.PI / points;
        const xa = Math.cos(angA) * outerR, ya = Math.sin(angA) * outerR;
        const xb = Math.cos(angB) * innerR, yb = Math.sin(angB) * innerR;
        if (i === 0) shape.moveTo(xa, ya); else shape.lineTo(xa, ya);
        shape.lineTo(xb, yb);
      }
      shape.closePath();
      const geo = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false, curveSegments: 8 });
      geo.rotateX(-Math.PI / 2);
      geo.translate(0, thickness, 0);
      return geo;
    }

    // ---- 各スプライトの共有ジオメトリ／マテリアル ----
    // 今は全部「仮の立方体」プレースホルダー。後でちゃんとした3Dモデル（MagicaVoxel等）に差し替え予定。
    // 仮の箱も従来の見た目（30×30ベース）で固定。当たり判定サイズとは連動させない
    const playerGeo = new THREE.BoxGeometry(30, 22, 30);
    const playerMat = new THREE.MeshStandardMaterial({ color: 0x2266ff, roughness: 0.5, metalness: 0.15 });
    const playerMesh = new THREE.Mesh(playerGeo, playerMat);
    playerMesh.castShadow = true;
    playerMesh.receiveShadow = false;
    scene.add(playerMesh);

    // 中ボス：単純な箱よりは少し機体らしいシルエットになるよう、胴体＋主翼＋尾翼の3ブロック構成にする
    const midBossMat = new THREE.MeshStandardMaterial({ color: 0x3a9ad9, roughness: 0.5, metalness: 0.15 });
    const midBossFinMat = new THREE.MeshStandardMaterial({ color: 0xd43131, roughness: 0.5, metalness: 0.15 });
    function buildMidBossTemplate() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(new THREE.BoxGeometry(70, 50, 260), midBossMat);
      body.position.set(0, 25, 0);
      group.add(body);

      const wing = new THREE.Mesh(new THREE.BoxGeometry(270, 20, 90), midBossMat);
      wing.position.set(0, 18, -10);
      group.add(wing);

      const tailFin = new THREE.Mesh(new THREE.BoxGeometry(16, 40, 40), midBossFinMat);
      tailFin.position.set(0, 45, 110);
      group.add(tailFin);

      group.traverse(o => { if (o.isMesh) o.castShadow = true; });
      return group;
    }
    const midBossTemplate = buildMidBossTemplate();

    const missileGeo = new THREE.BoxGeometry(12, 18, 48);
    const missileMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, emissive: 0x552222, roughness: 0.4 });

    const hardTwinGeo = new THREE.BoxGeometry(120, 34, 60);
    const hardTwinMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 0.6, metalness: 0.2, emissive: 0x000000 });

    // 通常敵・軌跡敵・ジグザグ敵で共有する立方体（MagicaVoxelモデルが読み込めるまでのフォールバック）
    const enemyShipGeo = new THREE.BoxGeometry(30, 20, 30);
    const enemyShipMat = new THREE.MeshStandardMaterial({ color: 0xdd2222, roughness: 0.5, metalness: 0.15 });

    // MagicaVoxelで作った通常敵モデル。読み込み完了後にスポーンする敵から反映される。
    // VOXMeshはコンストラクタがchunkを必須で取るため.clone()できない（引数無しで再構築されて例外になる）
    // ので、ジオメトリ／マテリアルとスケールだけを取り出して使い回す。
    let enemyShipVoxGeo = null;
    let enemyShipVoxMat = null;
    let enemyShipVoxScale = null;
    const voxLoader = new VOXLoader();
    voxLoader.load("Game/vox/teki.vox", (chunks) => {
      if (!chunks || !chunks.length) return;
      const chunk = chunks[0];
      const vmesh = new VOXMesh(chunk);
      vmesh.material.roughness = 0.5;
      vmesh.material.metalness = 0.15;
      enemyShipVoxGeo = vmesh.geometry;
      enemyShipVoxMat = vmesh.material;
      // ボクセルグリッドの見た目サイズを、実際の当たり判定（30×30）に合わせる
      enemyShipVoxScale = { x: 30 / chunk.size.x, y: 30 / chunk.size.x, z: 30 / chunk.size.y };
    });

    function createEnemyShipMesh(entity) {
      // 弾を撃つ通常敵は専用モデル（teki2.vox／Qモード中はq_teki2.vox）。
      // ファイル未配置・読み込み前はteki.voxと同じ見た目
      if (entity && entity.isShooter) {
        const v = (tunnelMode && qShooterVox) ? qShooterVox : shooterVox;
        if (v) {
          const m = new THREE.Mesh(v.geo, v.mat);
          const s = 30 / v.w; // 当たり判定30×30に見た目を合わせる
          m.scale.set(s, s, 30 / v.d);
          m.castShadow = true;
          return m;
        }
      }
      // Qモード中の通常敵はq_teki.voxに差し替え
      if (tunnelMode && qEnemyVox) {
        const m = new THREE.Mesh(qEnemyVox.geo, qEnemyVox.mat);
        const s = 30 / qEnemyVox.w;
        m.scale.set(s, s, 30 / qEnemyVox.d);
        m.castShadow = true;
        return m;
      }
      if (enemyShipVoxGeo) {
        const m = new THREE.Mesh(enemyShipVoxGeo, enemyShipVoxMat);
        m.scale.set(enemyShipVoxScale.x, enemyShipVoxScale.y, enemyShipVoxScale.z);
        m.castShadow = true;
        return m;
      }
      return new THREE.Mesh(enemyShipGeo, enemyShipMat);
    }

    // MagicaVoxelで作った自機モデル。読み込み完了後、青い仮の箱から差し替える。
    // グリッド全体ではなく実際に詰まっているボクセルの範囲（バウンディングボックス）を
    // 測ってスケールすることで、以前の立方体（当たり判定30×30）と同じ大きさに合わせる。
    voxLoader.load("Game/vox/jiki.vox", (chunks) => {
      if (!chunks || !chunks.length) return;
      const chunk = chunks[0];
      const vmesh = new VOXMesh(chunk);
      vmesh.material.roughness = 0.5;
      vmesh.material.metalness = 0.15;
      vmesh.geometry.computeBoundingBox();
      const bb = vmesh.geometry.boundingBox;
      const modelW = Math.max(1e-6, bb.max.x - bb.min.x); // 実際の機体の幅
      const modelD = Math.max(1e-6, bb.max.z - bb.min.z); // 実際の機体の奥行き
      playerMesh.geometry = vmesh.geometry;
      playerMesh.material = vmesh.material;
      // 薄い機体シルエットは同じ幅でも立方体より小さく見えるため、見た目だけ2倍にする。
      // 表示サイズは当たり判定(player.w/h)から切り離した固定値ベース：
      // 当たり判定を調整しても機体の見た目が変わらないようにする
      const PLAYER_VISUAL_BASE = 30; // 従来の30×30時代と同じ見た目を維持
      const PLAYER_VISUAL_SCALE = 2;
      playerMesh.scale.set(
        PLAYER_VISUAL_SCALE * PLAYER_VISUAL_BASE / modelW,
        PLAYER_VISUAL_SCALE * PLAYER_VISUAL_BASE / modelW,
        PLAYER_VISUAL_SCALE * PLAYER_VISUAL_BASE / modelD
      );
      // 敵と逆向き（画面奥＝進行方向）を向かせる
      playerMesh.rotation.y = Math.PI;
    });

    // ===== MagicaVoxelモデル（中ボス・大ボス・ミサイル・パワーアップ星） =====
    // teki.vox / jiki.vox と同じ方式：読み込み完了後に生成されるメッシュから反映され、
    // 読み込み前は従来のプレースホルダー（箱・星形ジオメトリ）を使う。
    function loadVoxModel(url, onLoaded) {
      voxLoader.load(url, (chunks) => {
        if (!chunks || !chunks.length) return;
        const chunk = chunks[0];
        const vmesh = new VOXMesh(chunk);
        vmesh.material.roughness = 0.5;
        vmesh.material.metalness = 0.15;
        vmesh.geometry.computeBoundingBox();
        const bb = vmesh.geometry.boundingBox;
        onLoaded({
          geo: vmesh.geometry,
          mat: vmesh.material,
          w: Math.max(1e-6, bb.max.x - bb.min.x), // 実際に詰まっているボクセルの幅
          h: Math.max(1e-6, bb.max.y - bb.min.y), // 同・高さ
          d: Math.max(1e-6, bb.max.z - bb.min.z), // 同・奥行き
          minY: bb.min.y
        });
      }, undefined, () => {
        // ファイル未配置などで読み込めない場合は何もしない（プレースホルダーのまま）
      });
    }

    // 中ボス（boss0.vox）。従来の3ブロック仮モデルと同様、底面を原点に合わせて
    // 「配置高度の上に乗る」形にする（センター合わせだと大型モデルが地面にめり込む）
    let midBossVox = null;
    loadVoxModel("Game/vox/boss0.vox", (m) => {
      m.geo.translate(0, -m.minY, 0);
      midBossVox = m;
    });

    // 大ボス（boss01.vox）。仮プレースホルダー（底面が原点の単位立方体）と同様に底面合わせ
    let finalBossVox = null;
    loadVoxModel("Game/vox/boss01.vox", (m) => {
      m.geo.translate(0, -m.minY, 0);
      finalBossVox = m;
    });

    // ミサイル（missile.vox）
    let missileVox = null;
    loadVoxModel("Game/vox/missile.vox", (m) => { missileVox = m; });

    // 弾を撃つ通常敵（teki2.vox）。リポジトリにファイルが置かれれば自動で反映され、
    // 無い間は読み込み失敗として無視され、従来のteki.voxのままになる
    let shooterVox = null;
    loadVoxModel("Game/vox/teki2.vox", (m) => { shooterVox = m; });

    // パワーアップ星（star.vox）。全種類ともモデルそのままの色で表示する
    let starVox = null;
    loadVoxModel("Game/vox/star.vox", (m) => { starVox = m; });

    // ===== Qモード専用の敵モデル（q_*.vox） =====
    // Qモード中に生成される敵メッシュから反映される。大きさの合わせ方は通常版と同じ。
