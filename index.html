<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>The Shooting Ⅲ (3D)</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
      height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: sans-serif;
    }
    #stage {
      position: relative;
      width: 760px;
      height: 640px;
      background: #000;
      border: 2px solid #555;
      outline: none;
    }
    #stage canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 760px;
      height: 640px;
      display: block;
    }
    #hud {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="stage" tabindex="0">
    <canvas id="webgl" width="760" height="640"></canvas>
    <canvas id="hud"   width="760" height="640"></canvas>
  </div>

  <!-- BGM用YouTubeプレーヤー（画面外に隠して音だけ使う） -->
  <div id="bgm-player" style="position:absolute; left:-9999px; top:-9999px;" aria-hidden="true"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { VOXLoader, VOXMesh } from "./vendor/three/VOXLoader.js";

    // ===== 画面/フィールド寸法（元の2Dゲームロジックの座標系をそのまま踏襲） =====
    const FIELD_W = 480;
    const FIELD_H = 640;

    // ===== 実際の描画（キャンバス）サイズ。斜めの3D視点でゲーム領域全部が
    // 見えるよう、ゲーム座標系(FIELD_W/FIELD_H)より横に広く取る。はみ出た分は黒。
    const CANVAS_W = 760;
    const CANVAS_H = 640;

    const stage = document.getElementById("stage");
    const hud = document.getElementById("hud");
    const hctx = hud.getContext("2d");

    // クリック/タップでも開始できるようにする（フォーカス問題対策）
    stage.tabIndex = 0;
    stage.addEventListener("pointerdown", () => {
      unlockBgm();
      if (!gameStarted && clearPhase === 0 && !gameCleared) startGame();
    });
    stage.focus();

    // ===== 効果音 =====
    const shootSound         = new Audio("Game/shoot.mp3");
    const enemyExplodeSound  = new Audio("Game/enemy_explode.mp3");
    const playerExplodeSound = new Audio("Game/player_explode.mp3");
    const starSound          = new Audio("Game/star.mp3");

    shootSound.volume         = 0.18;
    enemyExplodeSound.volume  = 0.18;
    playerExplodeSound.volume = 0.18;
    starSound.volume          = 0.27;

    function playSound(sound) {
      const s = sound.cloneNode();
      s.volume = sound.volume;
      s.play();
    }

    // ===== BGM（YouTube IFrame API。最初の敵を倒したときに鳴らす） =====
    // 3曲を順番にループ再生する。どの曲から始まるかはランダム。
    // APIの読み込みや再生に失敗してもゲーム本体には影響しない（無音で続行）。
    const BGM_VIDEO_IDS = ["SkypZuY6ZvA", "NOMa56y_Was", "G6tuvKE6_lA"];
    // 開始曲はページを開くたびに必ず変える：前回の開始曲をlocalStorageに記録して
    // 次の曲から始める（記録が使えない環境ではランダムにフォールバック）
    let bgmTrackIndex;
    try {
      const prev = parseInt(localStorage.getItem("bgmStartIndex"), 10);
      bgmTrackIndex = (Number.isInteger(prev)
        ? (prev + 1) % BGM_VIDEO_IDS.length
        : (Math.random() * BGM_VIDEO_IDS.length) | 0);
      localStorage.setItem("bgmStartIndex", String(bgmTrackIndex));
    } catch (e) {
      bgmTrackIndex = (Math.random() * BGM_VIDEO_IDS.length) | 0;
    }
    const BGM_VOLUME = 22;     // 0〜100
    let bgmUnlocked = false;   // ユーザー操作があったか（ブラウザの自動再生制限対策）
    let bgmPlaying  = false;   // 再生を開始したか（以後は曲送りで無限ループ）
    let bgmWantPlay = false;   // ゲーム側から再生要求が出ているか
    let ytPlayer = null;
    let ytReady  = false;

    (function loadYouTubeApi() {
      try {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        tag.onerror = () => {};
        document.head.appendChild(tag);
      } catch (e) { /* BGMなしで続行 */ }
    })();

    window.onYouTubeIframeAPIReady = function () {
      try {
        ytPlayer = new YT.Player("bgm-player", {
          width: 200, height: 200,
          videoId: BGM_VIDEO_IDS[bgmTrackIndex],
          playerVars: { autoplay: 0, controls: 0, disablekb: 1, playsinline: 1, rel: 0 },
          events: {
            onReady: () => {
              ytReady = true;
              ytPlayer.setVolume(BGM_VOLUME);
              tryStartBgm();
            },
            onStateChange: (ev) => {
              // 曲が終わったら次の曲へ。末尾まで行ったら先頭に戻る＝全体をループ
              if (ev.data === YT.PlayerState.ENDED && bgmPlaying) {
                bgmTrackIndex = (bgmTrackIndex + 1) % BGM_VIDEO_IDS.length;
                try { ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]); } catch (e) {}
              }
            },
            onError: () => {
              // 再生できない曲はスキップして次の曲へ
              if (!bgmPlaying) return;
              bgmTrackIndex = (bgmTrackIndex + 1) % BGM_VIDEO_IDS.length;
              try { ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]); } catch (e) {}
            }
          }
        });
      } catch (e) { /* BGMなしで続行 */ }
    };

    function tryStartBgm() {
      if (!bgmWantPlay || !bgmUnlocked || !ytReady || bgmPlaying) return;
      try {
        ytPlayer.setVolume(BGM_VOLUME);
        ytPlayer.loadVideoById(BGM_VIDEO_IDS[bgmTrackIndex]);
        bgmPlaying = true;
      } catch (e) { /* BGMなしで続行 */ }
    }

    function unlockBgm() {
      bgmUnlocked = true;
      tryStartBgm();
    }

    function startBgmIfReady() {
      bgmWantPlay = true;
      tryStartBgm();
    }

    // ===== 状態フラグ =====
    let gameStarted  = false;
    let gameOver     = false;
    let gameCleared  = false;

    let clearPhase = 0;
    let clearFrame = 0;
    let clearExplosionX = FIELD_W / 2;
    let clearExplosionY = FIELD_H / 2;

    let lastError = null;

    let finalBigExplosion = null;
    let clearFlashTimer = 0;

    const missileScorePoints = [500, 600, 700, 800, 900, 1000];
    const starScorePoints         = [1000,1300];
    const doubleShotStarPoints    = [1500];
    const doubleShotEndScore      = 1800;
    const missileSpawned = {};
    const starSpawned    = {};
    const doubleShotStarSpawned = {};

    // 入力
    const keys = {};
    document.addEventListener("keydown", e => {
      keys[e.code] = true;
      unlockBgm();

      if (!gameStarted && clearPhase === 0 && !gameCleared) {
        startGame();
        return;
      }

      if (gameCleared &&
          (e.code === "Space" || e.code === "Enter" || e.code === "KeyR")) {
        backToTitle();
      }

      if (gameStarted && !gameCleared && gameOver && e.code === "KeyR") {
        startGame();
      }
    });

    document.addEventListener("keyup", e => {
      keys[e.code] = false;
    });

    // ゲームパッド
    let activeGamepadIndex = null;
    window.addEventListener("gamepadconnected", e => {
      activeGamepadIndex = e.gamepad.index;
    });
    window.addEventListener("gamepaddisconnected", e => {
      if (activeGamepadIndex === e.gamepad.index) activeGamepadIndex = null;
    });

    const restartGamepadButtons = [0, 1, 2, 3, 9]; // ABXY + START
    let prevGamepadButtons = [];

    function isGamepadRestartJustPressed(gp) {
      if (!gp || !gp.buttons) {
        prevGamepadButtons = [];
        return false;
      }
      const nextButtons = gp.buttons.map(b => !!(b && b.pressed));
      const pressed = restartGamepadButtons.some(idx => nextButtons[idx] && !prevGamepadButtons[idx]);
      prevGamepadButtons = nextButtons;
      return pressed;
    }

    function readGamepad() {
      if (!navigator.getGamepads) return null;
      const pads = navigator.getGamepads();
      let gp = (activeGamepadIndex != null) ? pads[activeGamepadIndex] : pads[0];
      if (!gp) return null;

      const lx = gp.axes[0] || 0;
      const ly = gp.axes[1] || 0;

      const shoot    = gp.buttons[0]  && gp.buttons[0].pressed;
      const dpadUp   = gp.buttons[12] && gp.buttons[12].pressed;
      const dpadDown = gp.buttons[13] && gp.buttons[13].pressed;
      const dpadLeft = gp.buttons[14] && gp.buttons[14].pressed;
      const dpadRight= gp.buttons[15] && gp.buttons[15].pressed;
      const start    = gp.buttons[9]  && gp.buttons[9].pressed;

      return { lx, ly, shoot, dpadUp, dpadDown, dpadLeft, dpadRight, start, raw: gp };
    }

    // ===== オブジェクト =====
    const player = {
      x: FIELD_W / 2 - 15,
      y: FIELD_H - 80,
      w: 30,
      h: 30,
      speed: 5,
      fireCooldown: 0
    };

    const bullets = [];
    const enemies = [];
    const enemyBullets = [];
    const explosions = [];
    const powerStars = [];
    const doubleShotStars = [];

    let powerUpActive = false;
    let powerUpTimer  = 0;
    let doubleShotActive = false;

    let enemySpawnTimer = 0;

    let trailSpawnTimer = 0;
    let hardTwinSpawnTimer = 0;
    let zigzagSpawnTimer = 0;

    let score = 0;
    let nextBossScore = 300;
    let frameCount = 0;

    let finalMode        = false;
    let finalDelayFrames = 0;
    let finalBossSpawned = false;

    const stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * FIELD_W,
        y: Math.random() * FIELD_H,
        size: 1 + Math.random() * 2
      });
    }

    function getShooterRatio(score) {
      if (finalMode) return 0;
      if (score > 1300) return 0.5;
      if (score > 1000) return 1/3;
      if (score > 500)  return 0.25;
      return 0;
    }

    function spawnEnemy() {
      const w = 30;
      const h = 30;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;
      const speed = 2 + Math.random() * 2;

      const shooterRatio = getShooterRatio(score);
      const canShoot = (shooterRatio > 0) && (Math.random() < shooterRatio);
      const isDoublePattern = (score > 1300);

      const e = {
        x, y, w, h, speed,
        isBoss: false,
        isFinalBoss: false,
        isShooter: canShoot,
        isMissile: false,
        shotPattern: isDoublePattern ? "double" : "single",
        diagDir: (Math.random() < 0.5 ? -1 : 1),
        shotTimer: 0,
        shotsLeft: 0,
        trail: [],
        trailColor: TRAIL_COLORS[(Math.random()*TRAIL_COLORS.length)|0]
      };

      if (canShoot) {
        fireEnemyBulletsFromEnemy(e);
        e.shotsLeft = 1;
        e.shotTimer = 120;
      }

      enemies.push(e);
    }

    const TRAIL_COLORS = [
      "#ffffff", "#ff0000", "#ff69b4",
      "#78c8ff", "#0078ff", "#00ffc8",
      "#96ff50", "#be78ff", "#ffff00",
      "#ffa500"
    ];

    function randInt(min, max) {
      return (min + Math.random() * (max - min + 1)) | 0;
    }

    function spawnTrailEnemy() {
      const w = 30;
      const h = 30;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "trail_enemy",
        x, y, w, h,
        speed: 2,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        color: "#ffdd44",
        trail: [],
        trailColor: TRAIL_COLORS[randInt(0, TRAIL_COLORS.length - 1)],
        shotTimer: 120
      });
    }

    function spawnZigzagEnemy() {
      const w = 30;
      const h = 30;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "zigzag_enemy",
        x, y, w, h,
        speed: 1.8,
        baseX: x,
        zigPhase: Math.random() * Math.PI * 2,
        zigAmp: 70,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        color: "#66ccff",
        shotTimer: 180
      });
    }

    function spawnHardTwin() {
      const w = 120;
      const h = 60;
      const x = Math.random() * (FIELD_W - w);
      const y = -h;

      enemies.push({
        type: "hard_twin",
        x, y, w, h,
        speed: 1.0,
        isBoss: false,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        hp: 35
      });
    }

    function spawnMissilePair() {
      const count = 2;
      const w = 12;
      const h = 48;
      const speed = 6 * 1.5;
      for (let i = 0; i < count; i++) {
        const x = Math.random() * (FIELD_W - w);
        const y = -h;
        enemies.push({
          x, y, w, h, speed,
          isBoss: false,
          isFinalBoss: false,
          isShooter: false,
          isMissile: true
        });
      }
    }

    function spawnStar() {
      const size = 20;
      const x = Math.random() * (FIELD_W - size);
      const y = -size;
      powerStars.push({ x, y, size, w: size, h: size, speed: 2 });
    }

    function spawnDoubleShotStar() {
      const size = 20;
      const x = Math.random() * (FIELD_W - size);
      const y = -size;
      doubleShotStars.push({ x, y, size, w: size, h: size, speed: 2.2 });
    }

    function createBossAt(x) {
      const baseW = 30;
      const baseH = 30;
      const w = baseW * 9;
      const h = baseH * 9;
      const y = -h;
      const speed = 2;
      enemies.push({
        x, y, w, h, speed,
        isBoss: true,
        isFinalBoss: false,
        isShooter: false,
        isMissile: false,
        hp: 20,
        shotTimer: 180
      });
    }

    function spawnBoss() {
      const baseW = 30;
      const w = baseW * 9;
      const x = (FIELD_W - w) / 2;
      createBossAt(x);
    }

    function spawnBossPair() {
      const baseW = 30;
      const w = baseW * 9;
      const leftX  = FIELD_W * 0.25 - w / 2;
      const rightX = FIELD_W * 0.75 - w / 2;
      createBossAt(leftX);
      createBossAt(rightX);
    }

    function spawnFinalBoss() {
      const h = FIELD_H / 3;
      const w = h; // MagicaVoxelモデル差し替え前提の仮の正方形プレースホルダー
      const x = (FIELD_W - w) / 2;
      const y = FIELD_H * 0.05;
      const speed = 2;

      enemies.push({
        x, y, w, h, speed,
        isBoss: true,
        isFinalBoss: true,
        isShooter: false,
        isMissile: false,
        hp: 130,
        moveDir: 1,
        shotTimer: 120
      });
    }

    function checkBossSpawn() {
      if (finalMode) return;

      while (score >= nextBossScore) {
        if (nextBossScore === 1200) {
          nextBossScore += 300;
          continue;
        }
        if (nextBossScore === 1500) {
          spawnBossPair();
        } else {
          spawnBoss();
        }
        nextBossScore += 300;
      }
    }

    function tryStartFinalMode() {
      if (!finalMode && score > 1800) {
        finalMode = true;
        finalDelayFrames = 60 * 10;
      }
    }

    function handleScoreEvents() {
      for (const p of missileScorePoints) {
        if (!missileSpawned[p] && score >= p) {
          spawnMissilePair();
          missileSpawned[p] = true;
        }
      }
      for (const p of starScorePoints) {
        if (!starSpawned[p] && score >= p) {
          spawnStar();
          starSpawned[p] = true;
        }
      }
      if (score < doubleShotEndScore) {
        for (const p of doubleShotStarPoints) {
          if (!doubleShotStarSpawned[p] && score > p) {
            spawnDoubleShotStar();
            doubleShotStarSpawned[p] = true;
          }
        }
      }
    }

    function createFinalBigExplosion(x, y) {
      const maxRadius = Math.min(FIELD_W, FIELD_H) * 0.6;
      const maxLife   = 120;

      const baseColors = [
        "#ffffff", "#ffe066", "#ff9933", "#ff5555", "#ff66ff",
        "#66ccff", "#66ff66", "#ffff66", "#ff99cc", "#99ff99",
        "#99ccff", "#ffcc66", "#ff6666", "#ccccff", "#ffffff"
      ];

      const rings = [];
      for (let i = 0; i < 15; i++) {
        rings.push({
          color: baseColors[i % baseColors.length],
          delay: i * 0.03,
          width: 3 + i * 0.3
        });
      }

      finalBigExplosion = { x, y, life: 0, maxLife, maxRadius, rings };
    }

    function updateFinalBigExplosion() {
      if (!finalBigExplosion) return;
      finalBigExplosion.life++;
    }

    function startClearSequence(cx, cy) {
      clearPhase = 1;
      clearFrame = 0;
      for (const ex of explosions) removeMesh3D(ex);
      for (const b of bullets) removeMesh3D(b);
      for (const b of enemyBullets) removeMesh3D(b);
      for (const e of enemies) removeMesh3D(e);
      removeAllTrails();
      explosions.length = 0;
      bullets.length = 0;
      enemyBullets.length = 0;
      enemies.length = 0;

      clearExplosionX = (cx !== undefined) ? cx : FIELD_W / 2;
      clearExplosionY = (cy !== undefined) ? cy : FIELD_H / 2;

      createFinalBigExplosion(clearExplosionX, clearExplosionY);
      clearFlashTimer = 0;
    }

    // ===== 自機弾 =====
    function spawnPlayerBullet(angleDeg, offsetX = 0) {
      const speed = 8;
      const rad = angleDeg * Math.PI / 180;
      const vx = Math.sin(rad) * speed;
      const vy = -Math.cos(rad) * speed;

      bullets.push({
        x: player.x + player.w / 2 - 3 + offsetX,
        y: player.y,
        w: 6,
        h: 12,
        vx,
        vy
      });
    }

    function firePlayerShots() {
      const baseAngles = powerUpActive ? [-20, 0, 20] : [0];
      if (doubleShotActive) {
        const offset = 8;
        for (const ang of baseAngles) {
          spawnPlayerBullet(ang, -offset);
          spawnPlayerBullet(ang,  offset);
        }
      } else {
        for (const ang of baseAngles) {
          spawnPlayerBullet(ang);
        }
      }
      playSound(shootSound);
    }

    // ===== 敵弾 =====
    function fireEnemyBulletsFromEnemy(enemy) {
      const speed = 5;
      const angle = Math.PI / 6;

      const cx = enemy.x + enemy.w / 2 - 2;
      const cy = enemy.y + enemy.h / 2;

      if (enemy.shotPattern === "double") {
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: 0, vy: speed });
        const vx = Math.sin(angle) * speed * enemy.diagDir;
        const vy = Math.cos(angle) * speed;
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx, vy });
      } else {
        const vx = Math.sin(angle) * speed * enemy.diagDir;
        const vy = Math.cos(angle) * speed;
        enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx, vy });
      }
    }

    function fireFinalBossBullets(boss) {
      const speed = 6*1.5;
      const angle = Math.PI / 6;

      const cx = boss.x + boss.w * 0.5;
      const cy = boss.y + boss.h * 0.78;

      enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: 0, vy: speed });
      enemyBullets.push({
        x: cx, y: cy, w: 4, h: 10,
        vx: -Math.sin(angle) * speed,
        vy:  Math.cos(angle) * speed
      });
      enemyBullets.push({
        x: cx, y: cy, w: 4, h: 10,
        vx:  Math.sin(angle) * speed,
        vy:  Math.cos(angle) * speed
      });
    }

    // ===== 更新 =====
    function updatePlayer() {
      if (keys["ArrowLeft"]  || keys["KeyA"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
      if (keys["ArrowUp"]    || keys["KeyW"]) player.y -= player.speed;
      if (keys["ArrowDown"]  || keys["KeyS"]) player.y += player.speed;

      const pad = readGamepad();
      if (pad) {
        const dead = 0.25;
        if (Math.abs(pad.lx) > dead) player.x += pad.lx * player.speed;
        if (Math.abs(pad.ly) > dead) player.y += pad.ly * player.speed;
        if (pad.dpadLeft)  player.x -= player.speed;
        if (pad.dpadRight) player.x += player.speed;
        if (pad.dpadUp)    player.y -= player.speed;
        if (pad.dpadDown)  player.y += player.speed;
      }

      player.x = Math.max(0, Math.min(FIELD_W  - player.w, player.x));
      player.y = Math.max(0, Math.min(FIELD_H - player.h, player.y));

      if (player.fireCooldown > 0) player.fireCooldown--;

      const wantShootKeyboard = keys["Space"] || keys["KeyJ"];
      const wantShootPad = pad && pad.shoot;

      if ((wantShootKeyboard || wantShootPad) && player.fireCooldown === 0) {
        firePlayerShots();
        player.fireCooldown = 8;
      }
      if (powerUpActive) {
        powerUpTimer--;
        if (powerUpTimer <= 0) powerUpActive = false;
      }

      if (doubleShotActive && score >= doubleShotEndScore) {
        doubleShotActive = false;
      }
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y + b.h < 0 || b.y > FIELD_H ||
            b.x + b.w < 0 || b.x > FIELD_W) {
          removeMesh3D(b);
          bullets.splice(i, 1);
        }
      }
    }

    function updateEnemyBullets() {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx;
        b.y += b.vy;

        if (b.y > FIELD_H || b.x + b.w < 0 || b.x > FIELD_W) {
          removeMesh3D(b);
          enemyBullets.splice(i, 1);
          continue;
        }
        if (rectHit({x: player.x, y: player.y, w: player.w, h: player.h}, b)) {
          gameOver = true;
          playSound(playerExplodeSound);
          createExplosion(player.x + player.w/2, player.y + player.h/2, false);
          removeMesh3D(b);
          enemyBullets.splice(i, 1);
        }
      }
    }

    function updateEnemies() {
      if (!finalMode) {
        enemySpawnTimer--;
        if (enemySpawnTimer <= 0) {
          spawnEnemy();
          enemySpawnTimer = 40;
        }

        if (score > 500 && score < 1650) {
          hardTwinSpawnTimer--;
          if (hardTwinSpawnTimer <= 0) {
            spawnHardTwin();
            hardTwinSpawnTimer = randInt(60 * 7, 60 * 12);
          }
        }

        if (score > 900) {
          zigzagSpawnTimer--;
          if (zigzagSpawnTimer <= 0) {
            spawnZigzagEnemy();
            zigzagSpawnTimer = randInt(60 * 3, 60 * 5);
          }
        }
      } else {
        if (!finalBossSpawned) {
          if (finalDelayFrames > 0) {
            finalDelayFrames--;
          } else {
            spawnFinalBoss();
            finalBossSpawned = true;
          }
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];

        if (e.type === "trail_enemy") {
          e.y += e.speed;

          e.trail.push({ x: e.x + e.w/2, y: e.y + e.h/2, life: 240 });
          for (let tt = e.trail.length - 1; tt >= 0; tt--) {
            e.trail[tt].life--;
            if (e.trail[tt].life <= 0) e.trail.splice(tt, 1);
          }

          e.shotTimer--;
          if (e.shotTimer <= 0) {
            enemyBullets.push({ x: e.x + e.w/2 - 2, y: e.y + e.h, w: 4, h: 10, vx: 0, vy: 5 });
            e.shotTimer = 120;
          }

          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.type === "zigzag_enemy") {
          e.y += e.speed;

          e.zigPhase += 0.08;
          e.x = e.baseX + Math.sin(e.zigPhase) * e.zigAmp;

          if (e.x < 0) { e.x = 0; e.baseX = e.x; }
          if (e.x + e.w > FIELD_W) { e.x = FIELD_W - e.w; e.baseX = e.x; }

          e.shotTimer--;
          if (e.shotTimer <= 0) {
            const speed = 5;
            const ang = Math.PI / 6;
            const cx = e.x + e.w/2 - 2;
            const cy = e.y + e.h/2;

            enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx: -Math.sin(ang) * speed, vy: Math.cos(ang) * speed });
            enemyBullets.push({ x: cx, y: cy, w: 4, h: 10, vx:  Math.sin(ang) * speed, vy: Math.cos(ang) * speed });
            e.shotTimer = 120;
          }

          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.type === "hard_twin") {
          e.y += e.speed;
          if (e.hitFlash > 0) e.hitFlash--;
          if (e.y > FIELD_H + 50) {
            removeMesh3D(e);
            enemies.splice(i, 1);
          }
          continue;
        }

        if (e.isMissile) {
          e.y += e.speed;

          if (Array.isArray(e.trail)) {
            e.trail.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, life: 240 });
            for (let t = e.trail.length - 1; t >= 0; t--) {
              e.trail[t].life--;
              if (e.trail[t].life <= 0) e.trail.splice(t, 1);
            }
            if (e.trail.length > 260) e.trail.splice(0, e.trail.length - 260);
          }

          if (e.y > FIELD_H) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }
        } else if (e.isFinalBoss) {
          e.x += e.moveDir * e.speed;
          if (e.x < 0) {
            e.x = 0;
            e.moveDir = 1;
          } else if (e.x + e.w > FIELD_W) {
            e.x = FIELD_W - e.w;
            e.moveDir = -1;
          }

          e.shotTimer--;
          if (e.shotTimer <= 0) {
            fireFinalBossBullets(e);
            e.shotTimer = 180;
          }
        } else {
          e.y += e.speed;
          if (!e.isBoss && !e.isFinalBoss && !e.isMissile && Array.isArray(e.trail)) {
            e.trail.push({ x: e.x + e.w/2, y: e.y + e.h/2, life: 240 });
            for (let t = e.trail.length - 1; t >= 0; t--) {
              e.trail[t].life--;
              if (e.trail[t].life <= 0) e.trail.splice(t, 1);
            }
            if (e.trail.length > 260) e.trail.splice(0, e.trail.length - 260);
          }

          if (e.y > FIELD_H) {
            removeMesh3D(e);
            enemies.splice(i, 1);
            continue;
          }

          if (e.isBoss && !e.isFinalBoss) {
            if (typeof e.shotTimer !== "number") e.shotTimer = 180;
            e.shotTimer--;
            if (e.shotTimer <= 0) {
              const speed = 6;
              const y0 = e.y + e.h;
              enemyBullets.push({ x: e.x + e.w * 0.35, y: y0, w: 4, h: 10, vx: 0, vy: speed });
              enemyBullets.push({ x: e.x + e.w * 0.65, y: y0, w: 4, h: 10, vx: 0, vy: speed });
              e.shotTimer = 180;
            }
          }

          if (e.isShooter && !e.isBoss && e.shotsLeft > 0) {
            e.shotTimer--;
            if (e.shotTimer <= 0) {
              fireEnemyBulletsFromEnemy(e);
              e.shotsLeft = 0;
            }
          }
        }

        if (rectHit(player, e)) {
          gameOver = true;
          playSound(playerExplodeSound);
          createExplosion(player.x + player.w/2, player.y + player.h/2, false);
        }
      }
    }

    function updateStarsPower() {
      for (let i = powerStars.length - 1; i >= 0; i--) {
        const s = powerStars[i];
        s.y += s.speed;
        if (s.y > FIELD_H) {
          removeMesh3D(s);
          powerStars.splice(i, 1);
          continue;
        }
        const rect = { x: s.x, y: s.y, w: s.size, h: s.size };
        if (rectHit(player, rect)) {
          powerUpActive = true;
          powerUpTimer  = 60 * 8;
          removeMesh3D(s);
          powerStars.splice(i, 1);
          playSound(starSound);
        }
      }
    }

    function updateDoubleShotStars() {
      if (score >= doubleShotEndScore) {
        for (const s of doubleShotStars) removeMesh3D(s);
        doubleShotStars.length = 0;
        return;
      }
      for (let i = doubleShotStars.length - 1; i >= 0; i--) {
        const s = doubleShotStars[i];
        s.y += s.speed;
        if (s.y > FIELD_H) {
          removeMesh3D(s);
          doubleShotStars.splice(i, 1);
          continue;
        }
        const rect = { x: s.x, y: s.y, w: s.size, h: s.size };
        if (rectHit(player, rect)) {
          doubleShotActive = true;
          removeMesh3D(s);
          doubleShotStars.splice(i, 1);
          playSound(starSound);
        }
      }
    }

    function handleCollisions() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (rectHit(e, b)) {
            const exX = e.x + e.w / 2;
            const exY = e.y + e.h / 2;

            removeMesh3D(b);
            bullets.splice(j, 1);

            startBgmIfReady();

            if (e.isFinalBoss) {
              e.hp--;
              if (e.hp <= 0) {
                playSound(playerExplodeSound);
                removeMesh3D(e);
                startClearSequence(exX, exY);
              }
              break;
            }

            if (e.type === "hard_twin") {
              if (typeof e.hp !== "number") e.hp = 35;
              e.hp--;
              e.hitFlash = 6;
              if (e.hp <= 0) {
                removeMesh3D(e);
                enemies.splice(i, 1);
                score += 40;
                playSound(enemyExplodeSound);
                createExplosion(exX, exY, true);
                handleScoreEvents();
                if (!finalMode) checkBossSpawn();
                tryStartFinalMode();
              }
              break;
            }

            if (e.isBoss) {
              if (typeof e.hp !== "number") e.hp = 20;
              e.hp--;
              if (e.hp <= 0) {
                removeMesh3D(e);
                enemies.splice(i, 1);
                score += 10;
                playSound(playerExplodeSound);
                createExplosion(exX, exY, true);
                handleScoreEvents();
                if (!finalMode) checkBossSpawn();
                tryStartFinalMode();
              }
            } else if (e.isMissile) {
              removeMesh3D(e);
              enemies.splice(i, 1);
              score += 20;
              playSound(enemyExplodeSound);
              createExplosion(exX, exY, false);
              handleScoreEvents();
              if (!finalMode) checkBossSpawn();
              tryStartFinalMode();
            } else {
              removeMesh3D(e);
              enemies.splice(i, 1);
              score += 10;
              playSound(enemyExplodeSound);
              createExplosion(exX, exY, false);
              handleScoreEvents();
              if (!finalMode) checkBossSpawn();
              tryStartFinalMode();
            }
            break;
          }
        }
      }
    }

    function rectHit(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    // ===== 通常の爆発（敵・ミサイル用） =====
    const explosionPatterns = [
      { maxLife: 26, radiusScale: 1.0,
        rings: [ { r: 0.35, color: "#ff3300", alpha: 0.9 }, { r: 0.7,  color: "#ff9900", alpha: 0.7 }, { r: 1.0,  color: "#ffdd55", alpha: 0.5 } ] },
      { maxLife: 28, radiusScale: 1.1,
        rings: [ { r: 0.25, color: "#ffffcc", alpha: 0.9 }, { r: 0.55, color: "#ffdd33", alpha: 0.75 }, { r: 0.8,  color: "#ccff66", alpha: 0.6 }, { r: 1.0,  color: "#99ff66", alpha: 0.4 } ] },
      { maxLife: 24, radiusScale: 0.9,
        rings: [ { r: 0.3,  color: "#ff4444", alpha: 0.9 }, { r: 0.6,  color: "#ffee66", alpha: 0.7 }, { r: 0.9,  color: "#99ff66", alpha: 0.55 }, { r: 1.15, color: "#66ffee", alpha: 0.35 } ] },
      { maxLife: 30, radiusScale: 1.2,
        rings: [ { r: 0.2,  color: "#ffcc33", alpha: 1.0 }, { r: 0.5,  color: "#ffff66", alpha: 0.8 }, { r: 0.85, color: "#ff9933", alpha: 0.6 }, { r: 1.1,  color: "#99ff66", alpha: 0.4 } ] }
    ];

    function createExplosion(x, y, big) {
      const patternIndex = (Math.random() * explosionPatterns.length) | 0;
      const pattern = explosionPatterns[patternIndex];

      const baseSmall = 28;
      const baseRadius = big ? baseSmall * 8 : baseSmall;

      explosions.push({
        x, y, life: 0, patternIndex,
        maxRadius: baseRadius * pattern.radiusScale
      });
    }

    function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const ex = explosions[i];
        const pattern = explosionPatterns[ex.patternIndex];

        ex.life++;
        const totalLife = pattern.maxLife * 2;
        if (ex.life >= totalLife) {
          removeMesh3D(ex);
          explosions.splice(i, 1);
        }
      }
    }

    // ===== スコア関連フラグリセット =====
    function resetScoreFlags() {
      for (const k in missileSpawned) delete missileSpawned[k];
      for (const k in starSpawned) delete starSpawned[k];
      for (const k in doubleShotStarSpawned) delete doubleShotStarSpawned[k];
    }

    function clearAllMeshes() {
      for (const b of bullets) removeMesh3D(b);
      for (const b of enemyBullets) removeMesh3D(b);
      for (const e of enemies) removeMesh3D(e);
      for (const s of powerStars) removeMesh3D(s);
      for (const s of doubleShotStars) removeMesh3D(s);
      for (const ex of explosions) removeMesh3D(ex);
      removeAllTrails();
    }

    function startGame() {
      clearAllMeshes();
      bullets.length = 0;
      enemies.length = 0;
      enemyBullets.length = 0;
      explosions.length = 0;
      powerStars.length = 0;
      doubleShotStars.length = 0;
      resetScoreFlags();
      powerUpActive = false;
      powerUpTimer  = 0;
      doubleShotActive = false;

      score = 0;
      nextBossScore = 300;
      enemySpawnTimer = 30;
      trailSpawnTimer = randInt(60 * 5, 60 * 10);
      hardTwinSpawnTimer = randInt(60 * 6, 60 * 12);
      zigzagSpawnTimer = randInt(60 * 6, 60 * 12);
      player.x = FIELD_W / 2 - 15;
      player.y = FIELD_H - 80;
      player.fireCooldown = 0;
      gameOver = false;
      gameStarted = true;
      gameCleared = false;

      finalMode = false;
      finalDelayFrames = 0;
      finalBossSpawned = false;

      clearPhase = 0;
      clearFrame = 0;
      finalBigExplosion = null;
      clearFlashTimer = 0;

      resetBackgroundScrolls();
    }

    function backToTitle() {
      clearAllMeshes();
      bullets.length = 0;
      enemies.length = 0;
      enemyBullets.length = 0;
      explosions.length = 0;
      powerStars.length = 0;
      resetScoreFlags();
      doubleShotActive = false;

      score = 0;
      nextBossScore = 300;
      enemySpawnTimer = 30;
      trailSpawnTimer = randInt(60 * 5, 60 * 10);
      hardTwinSpawnTimer = randInt(60 * 6, 60 * 12);
      zigzagSpawnTimer = randInt(60 * 6, 60 * 12);
      player.fireCooldown = 0;

      finalMode = false;
      finalDelayFrames = 0;
      finalBossSpawned = false;

      clearPhase = 0;
      clearFrame = 0;
      finalBigExplosion = null;
      clearFlashTimer = 0;

      resetBackgroundScrolls();

      gameStarted = false;
      gameOver = false;
      gameCleared = false;
    }

    /* =========================================================================
       ここから Three.js による3D描画レイヤー
       ゲームロジック（座標・当たり判定・スコア等）は上と全く同じ2D平面上で計算し、
       描画だけを立体（ボクセル押し出し）に変換して表示する。
       ========================================================================= */

    // 影は「地面から浮いて見える」原因になるため一旦オフ。この定数をtrueに戻せば復活する。
    const ENABLE_SHADOWS = false;
    // 地面・空・フォグを同じ色にして、地平線が浮き上がって見えないようにする（宇宙空間の一体感）
    const SPACE_COLOR = 0x000000;

    const webglCanvas = document.getElementById("webgl");
    const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, antialias: true });
    renderer.setSize(CANVAS_W, CANVAS_H, false);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = ENABLE_SHADOWS;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(SPACE_COLOR);
    // 出現ラインを遠くへ押し出す分、そこがフォグで消えてしまわないよう可視距離も広げる
    // フォグは使わない。かけると出現ライン付近の敵が黒背景に沈んで見えず、
    // ラインを越えて手前に来てから見え始める＝「線から出てこない」ように見えるため。
    // 出現時のモヤ感はライン上の縦板（spawnGlow）のモヤが担当する。
    scene.fog = null;

    // スターフォックス的な、自機の斜め後ろ上空からの追従（チェイス）カメラ。
    // 自機・敵・弾すべてが同じ座標変換（toWorldX/toDepthZ）を使うことで、
    // 自機から出る弾の発射位置が自機の見た目とズレないようにする。
    // 元のyは「奥から手前への進行度」としてそのまま奥行き（Z）に変換するので、
    // 自機の上下移動＝奥行き方向（前後）の移動になる。
    const BASE_ALT     = 45;    // 自機・敵が飛ぶ標準高度（固定）
    // 横方向の「位置」だけを圧縮して画面に収める（当たり判定の実サイズとズレて
    // 見えないよう、各機体のジオメトリ幅そのものは圧縮しない＝見た目通りに当たる）
    const GLOBAL_X_SCALE = 0.75;
    // yの奥行き進行を実際の奥行きZに変換する係数。大きいほど敵の出現位置が遠く
    // （画面奥＝上部）に見え、画面全体を使って手前まで進んでくるようになる。
    const DEPTH_SCALE   = 3.4;

    const camera = new THREE.PerspectiveCamera(56, CANVAS_W / CANVAS_H, 1, 6000);
    function layoutCamera() {
      camera.aspect = CANVAS_W / CANVAS_H;
      camera.updateProjectionMatrix();
    }
    layoutCamera();
    camera.position.set(0, BASE_ALT + 180, 220);
    camera.up.set(0, 1, 0);
    // 見下ろし角をやや強めて、地平線（＝敵出現ライン）が画面の上の方に来るようにする
    camera.lookAt(0, BASE_ALT - 45, -900);

    const hemiLight = new THREE.HemisphereLight(0x8fb0ff, 0x0a0a12, 0.45);
    scene.add(hemiLight);

    // 自機付近（近〜中距離のレーン）を中心に影を落とす
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.9);
    sunLight.position.set(-250, 600, 450);
    sunLight.target.position.set(0, BASE_ALT, -600);
    sunLight.castShadow = ENABLE_SHADOWS;
    sunLight.shadow.mapSize.set(1024, 1024);
    sunLight.shadow.camera.left = -500;
    sunLight.shadow.camera.right = 500;
    sunLight.shadow.camera.top = 900;
    sunLight.shadow.camera.bottom = -900;
    sunLight.shadow.camera.near = 10;
    sunLight.shadow.camera.far = 2200;
    sunLight.shadow.bias = -0.0015;
    scene.add(sunLight);
    scene.add(sunLight.target);

    // 反対側からの弱いフィルライト（側面が真っ黒に潰れないように）
    const fillLight = new THREE.DirectionalLight(0x6699ff, 0.35);
    fillLight.position.set(300, 200, 200);
    fillLight.target.position.set(0, BASE_ALT, -600);
    scene.add(fillLight);
    scene.add(fillLight.target);

    // 座標変換：2Dゲーム座標(x, y) -> 3Dワールド座標
    // 自機・敵・弾・演出すべてが同じ変換を使う（自機だけ特別扱いすると、
    // そこから出る弾の発射位置が自機の見た目とズレてしまうため）。
    function toWorldX(x) { return (x - FIELD_W / 2) * GLOBAL_X_SCALE; }
    function toDepthZ(y) { return (y - FIELD_H) * DEPTH_SCALE; }

    // ===== TRON風グリッド地面 =====
    // 白い罫線（方眼紙状、大きめの正方形）だけを焼き込んだテクスチャを作り、
    // 実際の色はマテリアルのcolorで毎フレーム着色する（時間経過で色が変わる
    // サイバーパンク演出のため、テクスチャ自体を再生成せずに済むようにする）。
    function buildGridLineTexture(opts = {}) {
      const { cellPx = 171, lineWidth = 2, glow = 3, repeatX = 4, repeatY = 8 } = opts;
      const size = 1024;
      const cvs = document.createElement("canvas");
      cvs.width = size; cvs.height = size;
      const c = cvs.getContext("2d");
      c.fillStyle = "#000000";
      c.fillRect(0, 0, size, size);
      c.strokeStyle = "#ffffff";
      c.lineWidth = lineWidth;
      c.shadowColor = "#ffffff";
      c.shadowBlur = glow;
      for (let x = 0; x <= size; x += cellPx) {
        c.beginPath(); c.moveTo(x, 0); c.lineTo(x, size); c.stroke();
      }
      for (let y = 0; y <= size; y += cellPx) {
        c.beginPath(); c.moveTo(0, y); c.lineTo(size, y); c.stroke();
      }
      const tex = new THREE.CanvasTexture(cvs);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(repeatX, repeatY);
      // 奥（浅い角度）で線がぼやけて潰れないように異方性フィルタを最大にする
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      // sRGB指定がないと中間調が明るく持ち上がり、線の縁が太くぼやけて見える
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    // ===== 構成の原則 =====
    // 「黒背景の格子柄の地上」があり、その地面は敵出現ライン（toDepthZ(0)）で
    // 物理的に終わる。地面の遠端＝地平線＝敵出現ラインが構造的に必ず一致する。
    // それより上（奥）はすべて空（スクリーン背景のグラデーション）。
    const SPAWN_LINE_Z = toDepthZ(0);  // 敵が出現するy=0に対応する奥行き＝地平線
    const GROUND_NEAR_Z = 400;         // 地面の手前端（カメラより手前まで）
    // 地面幅は地平線の距離でも画面幅を確実に覆うくらい広く取る。狭いと地面の左右の
    // 端（側辺）が遠近法で収束して見え、地平線が三角形に「割れて」見えてしまう。
    const GROUND_W = 9100;
    const GROUND_D = GROUND_NEAR_Z - SPAWN_LINE_Z;
    const GROUND_REPEAT_X = 14;
    // 格子のマスが正方形になるよう、奥行き方向の繰り返し数は幅のマスサイズから算出
    const GROUND_REPEAT_Y = GROUND_D / (GROUND_W / GROUND_REPEAT_X);
    const groundGeo = new THREE.PlaneGeometry(GROUND_W, GROUND_D, 1, 1);
    const groundMat = new THREE.MeshBasicMaterial({
      map: buildGridLineTexture({ repeatX: GROUND_REPEAT_X, repeatY: GROUND_REPEAT_Y }),
      color: 0xffffff,
      // フォグをかけると遠端（＝地平線＝敵出現ライン）付近の格子が黒く潰れて
      // 「見えている地平線」が実際の地面の端より手前に来てしまう。
      // 格子は遠端までくっきり見せたいのでフォグの影響を受けない。
      fog: false
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    // 手前端GROUND_NEAR_Z〜遠端SPAWN_LINE_Z（＝敵出現ライン）を正確に覆う位置に置く
    ground.position.set(0, 0, (GROUND_NEAR_Z + SPAWN_LINE_Z) / 2);
    scene.add(ground);

    // 地面の遠端（＝地平線＝敵出現ライン）が画面のどの高さに映るかを求めておく。
    // 空側の演出（モヤ・グラデーション）はこの高さを基準に描く。
    // （初回レンダリング前なのでカメラ行列を明示的に更新してから投影する）
    camera.updateMatrixWorld();
    const horizonProbe = new THREE.Vector3(0, 0, SPAWN_LINE_Z);
    horizonProbe.project(camera);
    const HORIZON_FRACTION_FROM_BOTTOM = horizonProbe.y * 0.5 + 0.5;

    // 地平線より上の空間＝空。下（地平線ぎわ）は黒く、上へ行くほど気分色が
    // ついて明るくなるグラデーション。地平線のすぐ上には地平線ラインと同色の
    // モヤを少しだけ置く。気分色は時間経過で変化する（updateCyberColorsが
    // 毎フレーム再描画する。scene.backgroundとして使うスクリーン空間の背景）。
    const skyGradientCanvas = document.createElement("canvas");
    skyGradientCanvas.width = 2;
    skyGradientCanvas.height = 512;
    const skyGradientTex = new THREE.CanvasTexture(skyGradientCanvas);
    // sRGB指定がないとグラデーションが明るく持ち上がり、地平線ぎわの黒が
    // 灰色〜くすんだ色に化けて「黒から色へ」のグラデーションが感じられなくなる
    skyGradientTex.colorSpace = THREE.SRGBColorSpace;
    scene.background = skyGradientTex;
    // 空は「地平線＝黒、上へ行くほど色がつき明るくなる」を画面の空全体を使って
    // ゆるやかに描く（急な変化はベタ塗りに見えてグラデーションが感じられない）。
    // 地平線ぎわのモヤは空ではなく、地平線上に立てた縦板（spawnGlow）が担当する。
    function paintSkyGradient(topColor) {
      const c = skyGradientCanvas.getContext("2d");
      const h = skyGradientCanvas.height;
      const grad = c.createLinearGradient(0, h, 0, 0);
      const hf = Math.min(0.9, Math.max(0.02, HORIZON_FRACTION_FROM_BOTTOM));
      const mid = hf + (1 - hf) * 0.5;
      grad.addColorStop(0, "#000000");
      // 地平線の高さでは黒
      grad.addColorStop(hf, "#000000");
      // 空の中腹でもまだ暗め（色がつき始めたと分かる程度）
      grad.addColorStop(mid, `rgb(${topColor.r * 0.30 | 0},${topColor.g * 0.30 | 0},${topColor.b * 0.30 | 0})`);
      // 画面上端で最も明るい気分色
      grad.addColorStop(1, `rgb(${topColor.r},${topColor.g},${topColor.b})`);
      c.fillStyle = grad;
      c.fillRect(0, 0, skyGradientCanvas.width, h);
      skyGradientTex.needsUpdate = true;
    }

    // ===== サイバーパンク配色（グリッド線・出現ライン・空の気分色が時間経過で変化） =====
    // 線の色と空の色は必ず違う色になるよう、パレット上で2つずらして選ぶ。
    // 開始時：線＝青白、空の明るい部分＝#40e0d0（ターコイズ）
    const CYBER_PALETTE = [
      { r: 140, g: 210, b: 255 }, // 青白
      { r: 60,  g: 255, b: 140 }, // 緑
      { r: 64,  g: 224, b: 208 }, // ターコイズ #40e0d0
      { r: 255, g: 225, b: 60  }, // 黄色
      { r: 255, g: 70,  b: 60  }, // 赤
    ];
    const SKY_COLOR_OFFSET = 2;   // 空の色は線の色からパレット2つ先
    function paletteColorAt(phase) {
      const n = CYBER_PALETTE.length;
      const t = ((phase % n) + n) % n;
      const i0 = Math.floor(t);
      const i1 = (i0 + 1) % n;
      const f = t - i0;
      const c0 = CYBER_PALETTE[i0], c1 = CYBER_PALETTE[i1];
      return {
        r: Math.round(c0.r + (c1.r - c0.r) * f),
        g: Math.round(c0.g + (c1.g - c0.g) * f),
        b: Math.round(c0.b + (c1.b - c0.b) * f),
      };
    }
    // 30秒ごとに次の色へ切り替わり始め、15秒かけてゆっくり移り変わる
    // （30秒static＋15秒遷移＝45秒周期でパレットを1つ進める）
    const COLOR_HOLD_SEC = 30;
    const COLOR_TRANSITION_SEC = 15;
    const COLOR_CYCLE_SEC = COLOR_HOLD_SEC + COLOR_TRANSITION_SEC;
    // フレーム数基準だと高リフレッシュレートの画面（120Hz等）でサイクルが
    // 速く回ってしまうため、実時間（壁時計）基準で進める。
    const colorEpochMs = performance.now();
    function currentColorPhase() {
      const t = (performance.now() - colorEpochMs) / 1000;
      const cycleIndex = Math.floor(t / COLOR_CYCLE_SEC);
      const posInCycle = t - cycleIndex * COLOR_CYCLE_SEC;
      const localPhase = posInCycle < COLOR_HOLD_SEC
        ? 0
        : (posInCycle - COLOR_HOLD_SEC) / COLOR_TRANSITION_SEC;
      return cycleIndex + localPhase;
    }
    function updateCyberColors() {
      const phase = currentColorPhase();
      const lineColor = paletteColorAt(phase);
      const skyColor = paletteColorAt(phase + SKY_COLOR_OFFSET);
      groundMat.color.setRGB(lineColor.r / 255, lineColor.g / 255, lineColor.b / 255);
      spawnGlowMat.color.setRGB(lineColor.r / 255, lineColor.g / 255, lineColor.b / 255);
      paintSkyGradient(skyColor);
    }

    // ===== 敵出現ライン（地平線）の発光演出 =====
    // 敵は常に同じ横線（y≈0、画面奥のほぼ固定の奥行き）から出現するため単調に見える。
    // 地平線＝敵出現ラインの位置に、カメラの方を向いた「縦の板」を立てて描く。
    // （水平の板だと真横から見ることになり、モヤがほぼ画面に映らない）
    // 内容：板の最下端＝地面の高さに、視認性の高い明るい横一直線（＝地平線）。
    // モヤは線の上側（空側）にだけ広がる。線より下（地面側）にモヤは一切描かない。
    // 色は白のみで焼き込み、実際の色相はマテリアルのcolor（updateCyberColorsが毎フレーム
    // 更新）で決める＝格子の線と同じ色に時間経過で変化する。ゲームロジック
    // （出現座標・当たり判定）には一切影響しない、純粋な見た目だけの追加要素。
    const SPAWN_GLOW_H = 300;        // 板の高さ＝線から上へのモヤの広がり
    const SPAWN_LINE_THICKNESS = 5;  // 横一直線の太さ（ワールド単位）
    function buildSpawnLineGlowTexture() {
      const W = 4, H = 512;  // 横方向は一様なので幅は最小限、縦方向を高解像度に
      const cvs = document.createElement("canvas");
      cvs.width = W; cvs.height = H;
      const c = cvs.getContext("2d");
      const img = c.createImageData(W, H);
      const data = img.data;
      for (let y = 0; y < H; y++) {
        // canvasの上端(y=0)がテクスチャ上端(v=1)＝板の上端
        const v = 1 - y / (H - 1);
        const worldY = v * SPAWN_GLOW_H; // 板ローカルの高さ（0＝板の下端＝地面＝線）
        let a;
        if (worldY <= SPAWN_LINE_THICKNESS) {
          // 板の最下端：地平線ライン。くっきり明るい横一直線
          a = 255;
        } else {
          // 線の上側だけ：はっきり分かるモヤ。上へ行くほど薄く消える
          const d = worldY - SPAWN_LINE_THICKNESS;
          a = Math.round(150 * Math.pow(Math.max(0, 1 - d / 240), 1.6));
        }
        for (let x = 0; x < W; x++) {
          const idx = (y * W + x) * 4;
          data[idx] = 255; data[idx + 1] = 255; data[idx + 2] = 255; data[idx + 3] = a;
        }
      }
      c.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(cvs);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }
    // SPAWN_LINE_Z（＝地面の遠端＝地平線）は地面セクションで定義済み。
    // 縦板をその奥行きに立てるので、構造的に敵出現位置と必ず一致する。
    // 地面と同じ幅（画面幅を確実に覆う広さ）にして、左右一直線のラインにする。
    const spawnGlowGeo = new THREE.PlaneGeometry(GROUND_W, SPAWN_GLOW_H, 1, 1);
    const spawnGlowMat = new THREE.MeshBasicMaterial({
      map: buildSpawnLineGlowTexture(), transparent: true, depthWrite: false, fog: false
    });
    const spawnGlow = new THREE.Mesh(spawnGlowGeo, spawnGlowMat);
    // 回転なし＝+Z（カメラ側）を向いた縦板。板の下端（＝線）がワールドの地面（y=0）に
    // ぴったり乗るよう、中心を板の高さの半分だけ持ち上げる。
    spawnGlow.position.set(0, SPAWN_GLOW_H / 2, SPAWN_LINE_Z);
    scene.add(spawnGlow);

    // 前進している感じを出すため、地面のグリッドをゆっくりスクロールさせる。
    // このスクロール速度（ワールド座標換算）はクルーズ演出の空の星（Points）とも共有する。
    // offset.y を+方向に進めると、テクスチャ上の線は「奥（v=1側）→手前（v=0側）」に
    // 流れて見え、手前まで来たら奥へ戻って繰り返す＝奥から手前へ流れる前進感になる。
    const GROUND_SCROLL_UV_SPEED = 0.00075;
    let spaceScrollZ = 0;
    function updateGroundScroll() {
      groundMat.map.offset.y += GROUND_SCROLL_UV_SPEED;
      spaceScrollZ += GROUND_SCROLL_UV_SPEED * (GROUND_D / GROUND_REPEAT_Y);
      updateCyberColors();
    }

    // ===== 3Dスター背景 =====
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(stars.length * 3);
    function syncStarGeometry() {
      // 背景の星は遠くの空にある装飾なので、レーンの奥行きとは別に
      // 広く・遠くへ引き伸ばして配置する（スカイボックス的な扱い）。
      // 地面の近層と同じ spaceScrollZ を使い、奥から手前へ流れて手前で
      // 奥へ戻る（地面と背景のスクロールが一体化する）ようにする。
      const DEPTH_RANGE = 3600;
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const depthPhase = (s.y / FIELD_H) * DEPTH_RANGE;
        const cycled = ((depthPhase - spaceScrollZ) % DEPTH_RANGE + DEPTH_RANGE) % DEPTH_RANGE;
        starPositions[i*3]   = toWorldX(s.x) * 2.4;
        starPositions[i*3+1] = 120 + s.size * 90;
        starPositions[i*3+2] = -600 - cycled;
      }
      starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
      starGeo.attributes.position.needsUpdate = true;
    }
    syncStarGeometry();
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: false });
    const starPoints = new THREE.Points(starGeo, starMat);
    // 通常プレイ・タイトルでは背景（scene.background）の星で表示するため非表示にし、
    // クリア後のクルーズ演出（星の中を飛び抜けていく特別なフェーズ）でのみ表示する。
    starPoints.visible = false;
    scene.add(starPoints);

    // ===== スクロール背景画像（地面に貼るワイプ演出） =====
    const textureLoader = new THREE.TextureLoader();

    function createBackgroundScroll(src, triggerScore) {
      const state = {
        loaded: false, triggered: false, pending: false, active: false,
        y: -FIELD_H, triggerScore, mesh: null
      };
      textureLoader.load(src, (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: false });
        const geo = new THREE.PlaneGeometry(FIELD_W, FIELD_H);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.y = 0.5;
        mesh.visible = false;
        scene.add(mesh);
        state.mesh = mesh;
        state.loaded = true;
        if (state.pending) startBackgroundScroll(state);
      });
      return state;
    }

    function createBackgroundScroll2Frame(src0, src1, triggerScore, frameInterval) {
      const state = {
        loaded: false, triggered: false, pending: false, active: false,
        y: -FIELD_H, triggerScore, mesh: null, frameInterval,
        textures: [null, null], loadedCount: 0
      };
      const onTexLoaded = (tex, idx) => {
        tex.colorSpace = THREE.SRGBColorSpace;
        state.textures[idx] = tex;
        state.loadedCount++;
        if (state.loadedCount >= 2) {
          const mat = new THREE.MeshBasicMaterial({ map: state.textures[0], transparent: false });
          const geo = new THREE.PlaneGeometry(FIELD_W, FIELD_H);
          const mesh = new THREE.Mesh(geo, mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.y = 0.5;
          mesh.visible = false;
          scene.add(mesh);
          state.mesh = mesh;
          state.loaded = true;
          if (state.pending) startBackgroundScroll(state);
        }
      };
      textureLoader.load(src0, t => onTexLoaded(t, 0));
      textureLoader.load(src1, t => onTexLoaded(t, 1));
      return state;
    }

    const backgroundScrollSpeed = 0.9;
    const backgroundScrolls = [
      createBackgroundScroll("Game/back1.png", 1650),
      createBackgroundScroll2Frame("Game/back2_0.png", "Game/back2_1.png", 1000, 12)
    ];

    function startBackgroundScroll(bg) {
      bg.y = -FIELD_H;
      bg.active = true;
      bg.pending = false;
      if (bg.mesh) bg.mesh.visible = true;
    }

    function resetBackgroundScrolls() {
      for (const bg of backgroundScrolls) {
        bg.triggered = false;
        bg.pending = false;
        bg.active = false;
        bg.y = -FIELD_H;
        if (bg.mesh) bg.mesh.visible = false;
      }
    }

    function updateBackgroundScroll() {
      for (const bg of backgroundScrolls) {
        if (!bg.triggered && score >= bg.triggerScore) {
          bg.triggered = true;
          if (bg.loaded) startBackgroundScroll(bg);
          else bg.pending = true;
        }

        if (!bg.active) continue;
        bg.y += backgroundScrollSpeed;
        if (bg.y >= FIELD_H) {
          bg.active = false;
          if (bg.mesh) bg.mesh.visible = false;
          continue;
        }
        if (bg.mesh) {
          bg.mesh.position.set(0, 0.5, toDepthZ(bg.y));
          if (bg.textures) {
            const idx = Math.floor(frameCount / bg.frameInterval) % bg.textures.length;
            if (bg.mesh.material.map !== bg.textures[idx]) {
              bg.mesh.material.map = bg.textures[idx];
              bg.mesh.material.needsUpdate = true;
            }
          }
        }
      }
    }

    function buildStarShapeGeometry(points, outerR, innerR, thickness) {
      const shape = new THREE.Shape();
      for (let i = 0; i < points; i++) {
        const angA = (Math.PI * 2 / points) * i - Math.PI / 2;
        const angB = angA + Math.PI / points;
        const xa = Math.cos(angA) * outerR, ya = Math.sin(angA) * outerR;
        const xb = Math.cos(angB) * innerR, yb = Math.sin(angB) * innerR;
        if (i === 0) shape.moveTo(xa, ya); else shape.lineTo(xa, ya);
        shape.lineTo(xb, yb);
      }
      shape.closePath();
      const geo = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false, curveSegments: 8 });
      geo.rotateX(-Math.PI / 2);
      geo.translate(0, thickness, 0);
      return geo;
    }

    // ---- 各スプライトの共有ジオメトリ／マテリアル ----
    // 今は全部「仮の立方体」プレースホルダー。後でちゃんとした3Dモデル（MagicaVoxel等）に差し替え予定。
    const playerGeo = new THREE.BoxGeometry(player.w, 22, player.h);
    const playerMat = new THREE.MeshStandardMaterial({ color: 0x2266ff, roughness: 0.5, metalness: 0.15 });
    const playerMesh = new THREE.Mesh(playerGeo, playerMat);
    playerMesh.castShadow = true;
    playerMesh.receiveShadow = false;
    scene.add(playerMesh);

    // 中ボス：単純な箱よりは少し機体らしいシルエットになるよう、胴体＋主翼＋尾翼の3ブロック構成にする
    const midBossMat = new THREE.MeshStandardMaterial({ color: 0x3a9ad9, roughness: 0.5, metalness: 0.15 });
    const midBossFinMat = new THREE.MeshStandardMaterial({ color: 0xd43131, roughness: 0.5, metalness: 0.15 });
    function buildMidBossTemplate() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(new THREE.BoxGeometry(70, 50, 260), midBossMat);
      body.position.set(0, 25, 0);
      group.add(body);

      const wing = new THREE.Mesh(new THREE.BoxGeometry(270, 20, 90), midBossMat);
      wing.position.set(0, 18, -10);
      group.add(wing);

      const tailFin = new THREE.Mesh(new THREE.BoxGeometry(16, 40, 40), midBossFinMat);
      tailFin.position.set(0, 45, 110);
      group.add(tailFin);

      group.traverse(o => { if (o.isMesh) o.castShadow = true; });
      return group;
    }
    const midBossTemplate = buildMidBossTemplate();

    const missileGeo = new THREE.BoxGeometry(12, 18, 48);
    const missileMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, emissive: 0x552222, roughness: 0.4 });

    const hardTwinGeo = new THREE.BoxGeometry(120, 34, 60);
    const hardTwinMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 0.6, metalness: 0.2, emissive: 0x000000 });

    // 通常敵・軌跡敵・ジグザグ敵で共有する立方体（MagicaVoxelモデルが読み込めるまでのフォールバック）
    const enemyShipGeo = new THREE.BoxGeometry(30, 20, 30);
    const enemyShipMat = new THREE.MeshStandardMaterial({ color: 0xdd2222, roughness: 0.5, metalness: 0.15 });

    // MagicaVoxelで作った通常敵モデル。読み込み完了後にスポーンする敵から反映される。
    // VOXMeshはコンストラクタがchunkを必須で取るため.clone()できない（引数無しで再構築されて例外になる）
    // ので、ジオメトリ／マテリアルとスケールだけを取り出して使い回す。
    let enemyShipVoxGeo = null;
    let enemyShipVoxMat = null;
    let enemyShipVoxScale = null;
    const voxLoader = new VOXLoader();
    voxLoader.load("Game/vox/teki.vox", (chunks) => {
      if (!chunks || !chunks.length) return;
      const chunk = chunks[0];
      const vmesh = new VOXMesh(chunk);
      vmesh.material.roughness = 0.5;
      vmesh.material.metalness = 0.15;
      enemyShipVoxGeo = vmesh.geometry;
      enemyShipVoxMat = vmesh.material;
      // ボクセルグリッドの見た目サイズを、実際の当たり判定（30×30）に合わせる
      enemyShipVoxScale = { x: 30 / chunk.size.x, y: 30 / chunk.size.x, z: 30 / chunk.size.y };
    });

    function createEnemyShipMesh() {
      if (enemyShipVoxGeo) {
        const m = new THREE.Mesh(enemyShipVoxGeo, enemyShipVoxMat);
        m.scale.set(enemyShipVoxScale.x, enemyShipVoxScale.y, enemyShipVoxScale.z);
        m.castShadow = true;
        return m;
      }
      return new THREE.Mesh(enemyShipGeo, enemyShipMat);
    }

    // 自機弾・敵弾
    // 縦（高さ・進行方向の長さ）は当たり判定の半分の見た目にする（横幅はそのまま）
    const playerBulletGeo = new THREE.BoxGeometry(6, 8, 6);
    const playerBulletMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x554400, roughness: 0.3 });
    // 敵弾も自機弾同様、縦（高さ・進行方向の長さ）は当たり判定の半分の見た目
    const enemyBulletGeo = new THREE.BoxGeometry(4, 7, 5);
    const enemyBulletMat = new THREE.MeshStandardMaterial({ color: 0xff5555, emissive: 0x550000, roughness: 0.3 });

    // パワーアップ★（3方向ショット／2連ショット）
    const powerStarGeo = buildStarShapeGeometry(5, 10, 4, 10);
    const powerStarMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x666622, roughness: 0.3, metalness: 0.4 });
    const doubleStarMat = new THREE.MeshStandardMaterial({ color: 0xbbeaff, emissive: 0x224466, roughness: 0.3, metalness: 0.4 });

    // 最終ボス：MagicaVoxelモデルに差し替え予定の仮プレースホルダー（単色の直方体）
    const finalBossUnitGeo = new THREE.BoxGeometry(1, 1, 1);
    finalBossUnitGeo.translate(0, 0.5, 0);
    const finalBossMat = new THREE.MeshStandardMaterial({ color: 0xff9933, roughness: 0.5, metalness: 0.25, emissive: 0x331100 });

    function createMesh3D(entity) {
      let mesh;
      if (entity === player) {
        return playerMesh;
      } else if (entity.isFinalBoss) {
        mesh = new THREE.Mesh(finalBossUnitGeo, finalBossMat);
        mesh.castShadow = true;
      } else if (entity.type === "hard_twin") {
        const mat = hardTwinMat.clone();
        mesh = new THREE.Mesh(hardTwinGeo, mat);
        mesh.castShadow = true;
      } else if (entity.isBoss) {
        mesh = midBossTemplate.clone();
      } else if (entity.isMissile) {
        mesh = new THREE.Mesh(missileGeo, missileMat);
        mesh.castShadow = true;
      } else if (entity.w === player.w && entity.h === player.h && !entity.hasOwnProperty("size") && !entity.hasOwnProperty("vx")) {
        // 通常敵／軌跡敵／ジグザグ敵（MagicaVoxelモデル。読み込み前は立方体）
        mesh = createEnemyShipMesh();
      } else if (entity.hasOwnProperty("vx") && entity.h > entity.w) {
        // 弾（自機弾／敵弾は幅より高さが大きい細長い矩形）
        const isPlayerBullet = entity.vy < 0 || (entity.vy === 0 && entity.vx !== 0 && entity.w === 6);
        mesh = new THREE.Mesh(isPlayerBullet ? playerBulletGeo : enemyBulletGeo, isPlayerBullet ? playerBulletMat : enemyBulletMat);
      } else if (entity.hasOwnProperty("size")) {
        // パワーアップ★
        const isDouble = doubleShotStars.includes(entity);
        mesh = new THREE.Mesh(powerStarGeo, isDouble ? doubleStarMat : powerStarMat);
        mesh.castShadow = true;
      } else {
        mesh = createEnemyShipMesh();
      }
      scene.add(mesh);
      entity.mesh3d = mesh;
      return mesh;
    }

    function removeMesh3D(entity) {
      if (entity && entity.mesh3d) {
        scene.remove(entity.mesh3d);
        entity.mesh3d = null;
      }
    }

    function getOrCreateMesh(entity) {
      return entity.mesh3d || createMesh3D(entity);
    }

    function heightFor(entity) {
      if (entity.isFinalBoss) return BASE_ALT + 10;
      if (entity.type === "hard_twin") return BASE_ALT + 14;
      if (entity.isBoss) return BASE_ALT + 20;
      if (entity.isMissile) return BASE_ALT + 10;
      if (entity.hasOwnProperty("vx")) return BASE_ALT + 9;
      if (entity.hasOwnProperty("size")) return BASE_ALT + 5;
      return BASE_ALT;
    }

    function syncBoxEntities(list) {
      for (const e of list) {
        const mesh = getOrCreateMesh(e);
        if (e.isFinalBoss) {
          mesh.scale.set(e.w, 60, e.h);
        }
        const cx = e.x + e.w / 2;
        const cy = e.y + e.h / 2;
        mesh.position.set(toWorldX(cx), heightFor(e), toDepthZ(cy));

        if (e.type === "zigzag_enemy") {
          mesh.rotation.y = Math.max(-0.5, Math.min(0.5, -Math.sin(e.zigPhase) * 0.6));
        } else if (e.isFinalBoss) {
          mesh.rotation.y = 0;
        } else {
          mesh.rotation.y = 0;
        }

        if (e.type === "hard_twin" && mesh.material) {
          const flashT = (e.hitFlash || 0) / 6;
          mesh.material.emissive.setRGB(flashT, flashT, flashT);
        }
      }
    }

    // ===== 敵の光跡（トレイル）を3Dの発光ラインで表現 =====
    const trailLines = new Map();
    function syncTrails() {
      const live = new Set();
      for (const e of enemies) {
        if (!Array.isArray(e.trail) || e.trail.length < 2) continue;
        live.add(e);

        let line = trailLines.get(e);
        if (!line) {
          const geo = new THREE.BufferGeometry();
          const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
          line = new THREE.Line(geo, mat);
          scene.add(line);
          trailLines.set(e, line);
        }

        const n = e.trail.length;
        const positions = new Float32Array(n * 3);
        const colors = new Float32Array(n * 3);
        const base = new THREE.Color(e.trailColor || "#ffff00");
        const trailY = heightFor(e);
        for (let i = 0; i < n; i++) {
          const p = e.trail[i];
          positions[i*3]   = toWorldX(p.x);
          positions[i*3+1] = trailY;
          positions[i*3+2] = toDepthZ(p.y);
          const a = Math.max(0, Math.min(1, p.life / 240));
          colors[i*3]   = base.r * a;
          colors[i*3+1] = base.g * a;
          colors[i*3+2] = base.b * a;
        }
        line.geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        line.geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        line.geometry.attributes.position.needsUpdate = true;
        line.geometry.attributes.color.needsUpdate = true;
      }

      for (const [e, line] of trailLines) {
        if (!live.has(e)) {
          scene.remove(line);
          trailLines.delete(e);
        }
      }
    }

    function removeAllTrails() {
      for (const [, line] of trailLines) scene.remove(line);
      trailLines.clear();
    }

    // ===== 通常爆発の3D表現（膨張する半透明の光球） =====
    function ensureExplosionMesh(ex) {
      if (ex.mesh3d) return ex.mesh3d;
      const pattern = explosionPatterns[ex.patternIndex];
      const group = new THREE.Group();
      group.userData.rings = [];
      for (const ring of pattern.rings) {
        const geo = new THREE.SphereGeometry(1, 12, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: ring.color, transparent: true, opacity: ring.alpha,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        group.add(mesh);
        group.userData.rings.push({ mesh, ring });
      }
      const coreGeo = new THREE.SphereGeometry(1, 10, 8);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffee, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
      const core = new THREE.Mesh(coreGeo, coreMat);
      group.add(core);
      group.userData.core = core;

      scene.add(group);
      ex.mesh3d = group;
      return group;
    }

    function syncExplosions() {
      const live = new Set(explosions);
      for (const ex of explosions) {
        const pattern = explosionPatterns[ex.patternIndex];
        const totalLife = pattern.maxLife * 2;
        const t = ex.life / totalLife;
        const ease = Math.sqrt(t);
        const alphaBase = 1 - t;

        const group = ensureExplosionMesh(ex);
        group.position.set(toWorldX(ex.x), BASE_ALT + 6, toDepthZ(ex.y));

        for (const { mesh, ring } of group.userData.rings) {
          const radius = Math.max(0.001, ex.maxRadius * ring.r * ease);
          mesh.scale.setScalar(radius);
          mesh.material.opacity = Math.max(0, alphaBase * ring.alpha);
        }
        const core = group.userData.core;
        core.scale.setScalar(Math.max(0.001, ex.maxRadius * 0.15 * (1 - t)));
        core.material.opacity = Math.max(0, alphaBase * 0.9);
      }

      for (const child of [...scene.children]) {
        // no-op safeguard; actual cleanup handled by removeMesh3D on splice
      }
      for (const [k] of trailLines) { /* trails cleaned separately */ }
      void live;
    }

    // ===== 大ボス撃破：15重リング花火（地面に広がるリング＋中心の光） =====
    let finalBigExplosionGroup = null;

    function ensureFinalBigExplosionGroup() {
      if (finalBigExplosionGroup) return finalBigExplosionGroup;
      const group = new THREE.Group();
      group.userData.rings = [];
      for (const ring of finalBigExplosion.rings) {
        const geo = new THREE.RingGeometry(0.94, 1, 64);
        geo.rotateX(-Math.PI / 2);
        const mat = new THREE.MeshBasicMaterial({
          color: ring.color, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.y = 2;
        group.add(mesh);
        group.userData.rings.push({ mesh, ring });
      }
      const coreGeo = new THREE.SphereGeometry(1, 16, 12);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xffe066, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.y = 20;
      group.add(core);
      group.userData.core = core;

      group.position.set(toWorldX(finalBigExplosion.x), BASE_ALT, toDepthZ(finalBigExplosion.y));
      scene.add(group);
      finalBigExplosionGroup = group;
      return group;
    }

    function syncFinalBigExplosion() {
      if (!finalBigExplosion) {
        if (finalBigExplosionGroup) {
          scene.remove(finalBigExplosionGroup);
          finalBigExplosionGroup = null;
        }
        return;
      }
      const fw = finalBigExplosion;
      const baseT = fw.life / fw.maxLife;
      const group = ensureFinalBigExplosionGroup();

      const tLead = Math.min(1, baseT);
      const easeLead = Math.sqrt(tLead);
      let fillColor;
      if (baseT < 0.5) fillColor = 0xffe066;
      else if (baseT < 0.8) fillColor = 0xffffff;
      else fillColor = (fw.life % 6) < 3 ? 0xffffff : 0xffcccc;
      group.userData.core.material.color.setHex(fillColor);
      group.userData.core.material.opacity = 0.85 * (baseT > 0 ? 1 : 0);
      group.userData.core.scale.setScalar(Math.max(0.001, fw.maxRadius * easeLead));

      for (const { mesh, ring } of group.userData.rings) {
        const tRaw = (baseT - ring.delay) / (1 - ring.delay);
        if (tRaw <= 0 || tRaw >= 1.1) {
          mesh.material.opacity = 0;
          continue;
        }
        const t = Math.min(1, tRaw);
        const ease = Math.sqrt(t);
        const radius = Math.max(0.001, fw.maxRadius * ease);
        mesh.scale.setScalar(radius);
        mesh.material.opacity = Math.max(0, (1 - baseT) * 0.9);
      }
    }

    function syncPlayerMesh() {
      playerMesh.position.set(
        toWorldX(player.x + player.w / 2),
        BASE_ALT,
        toDepthZ(player.y + player.h / 2)
      );
    }

    function syncStarfieldMotion() {
      syncStarGeometry();
    }

    function render3D() {
      syncBoxEntities(bullets);
      syncBoxEntities(enemyBullets);
      syncBoxEntities(enemies);
      syncBoxEntities(powerStars);
      syncBoxEntities(doubleShotStars);
      syncTrails();
      syncExplosions();
      syncFinalBigExplosion();
      syncPlayerMesh();
      syncStarfieldMotion();

      ground.visible = (clearPhase === 0);
      spawnGlow.visible = (clearPhase === 0);
      starPoints.visible = false;
      updateGroundScroll();
      for (const bg of backgroundScrolls) {
        if (bg.mesh) bg.mesh.visible = bg.active && clearPhase === 0;
      }

      renderer.render(scene, camera);
    }

    /* =========================================================================
       HUD（スコア・タイトル・ゲームオーバー等のテキストのみ）2D描画レイヤー
       ========================================================================= */

    function drawTitleHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.textAlign = "center";

      hctx.fillStyle = "#00ffff";
      hctx.font = "40px monospace";
      hctx.fillText("THE SHOOTINGⅡ", CANVAS_W / 2, 160);

      hctx.font = "14px monospace";
      hctx.fillStyle = "#88ff88";
      hctx.fillText("1 PLAYER   XBOX / KEYBOARD", CANVAS_W / 2, 200);

      const blinkOn = Math.floor(frameCount / 30) % 2 === 0;
      if (blinkOn) {
        hctx.font = "20px monospace";
        hctx.fillStyle = "#ffffff";
        hctx.fillText("PUSH ANY BUTTON", CANVAS_W / 2, 320);
      }
      hctx.textAlign = "left";
    }

    function drawUIHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.fillStyle = "#fff";
      hctx.font = "18px sans-serif";
      hctx.fillText("SCORE: " + score, 10, 24);
    }

    function drawGameOverHud() {
      hctx.fillStyle = "#fff";
      hctx.font = "18px sans-serif";
      hctx.fillText("SCORE: " + score, 10, 24);

      hctx.fillStyle = "rgba(0,0,0,0.6)";
      hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      hctx.fillStyle = "#fff";
      hctx.font = "32px sans-serif";
      hctx.textAlign = "center";
      hctx.fillText("GAME OVER", CANVAS_W / 2, CANVAS_H / 2 - 10);
      hctx.font = "12px sans-serif";
      hctx.fillText("Rキーorゲームパッドの各ボタンでリスタート", CANVAS_W / 2, CANVAS_H / 2 + 30);
      hctx.textAlign = "left";
    }

    function drawClearFlashHud() {
      hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      if (clearFlashTimer > 0) {
        const alpha = clearFlashTimer / 15;
        hctx.fillStyle = `rgba(255,255,255,${alpha})`;
        hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      }
    }

    // ===== エンディング画像 =====
    const endingImage = new Image();
    endingImage.src = "Game/last.jpg";
    let endingImageLoaded = false;
    endingImage.onload = () => { endingImageLoaded = true; };

    function drawClearScreenHud() {
      if (endingImageLoaded) {
        hctx.drawImage(endingImage, 0, 0, CANVAS_W, CANVAS_H);
      } else {
        hctx.fillStyle = "#000";
        hctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        hctx.fillStyle = "#ffffff";
        hctx.textAlign = "center";
        hctx.font = "26px monospace";
        hctx.fillText("CONGRATULATION!", CANVAS_W / 2, CANVAS_H / 2);
        hctx.font = "16px monospace";
        hctx.fillText("PUSH BUTTON TO TITLE", CANVAS_W / 2, CANVAS_H / 2 + 40);
        hctx.textAlign = "left";
      }
    }

    function updateClearExplosionPhase() {
      clearFrame++;
      updateFinalBigExplosion();

      if (finalBigExplosion && finalBigExplosion.life >= finalBigExplosion.maxLife && clearFlashTimer === 0) {
        clearFlashTimer = 15;
      }

      if (clearFlashTimer > 0) {
        clearFlashTimer--;
        if (clearFlashTimer === 0) {
          clearPhase = 2;
          clearFrame = 0;
          finalBigExplosion = null;
        }
      }
    }

    function updateCruisePhase() {
      clearFrame++;

      for (const s of stars) {
        s.y += 1.5;
        if (s.y > FIELD_H) s.y -= FIELD_H;
      }

      player.y -= 0.8;
      const limitY = FIELD_H * 0.3;
      if (player.y < limitY) player.y = limitY;

      if (clearFrame >= 60 * 5) {
        clearPhase = 3;
        clearFrame = 0;
        gameCleared = true;
      }
    }

    // ===== メインループ =====
    enemySpawnTimer = 30;

    function loop() {
      frameCount++;

      try {
        const pads = navigator.getGamepads ? navigator.getGamepads() : [];
        const pad0 = (activeGamepadIndex != null) ? pads[activeGamepadIndex] : pads[0];
        const restartByGamepad = isGamepadRestartJustPressed(pad0);

        if (clearPhase === 1) {
          updateClearExplosionPhase();
          syncPlayerMesh();
          syncFinalBigExplosion();
          ground.visible = false;
          spawnGlow.visible = false;
          starPoints.visible = false;
          for (const bg of backgroundScrolls) if (bg.mesh) bg.mesh.visible = false;
          renderer.render(scene, camera);
          drawClearFlashHud();
        } else if (clearPhase === 2) {
          updateCruisePhase();
          syncPlayerMesh();
          syncStarfieldMotion();
          ground.visible = false;
          spawnGlow.visible = false;
          starPoints.visible = true;
          for (const bg of backgroundScrolls) if (bg.mesh) bg.mesh.visible = false;
          renderer.render(scene, camera);
          hctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        } else if (clearPhase === 3) {
          drawClearScreenHud();
        } else if (!gameStarted) {
          syncPlayerMesh();
          syncStarfieldMotion();
          ground.visible = true;
          spawnGlow.visible = true;
          starPoints.visible = false;
          updateGroundScroll();
          renderer.render(scene, camera);
          drawTitleHud();
          if (pad0 && pad0.buttons) {
            const anyPressed = pad0.buttons.some(b => b.pressed);
            if (anyPressed) {
              unlockBgm();
              startGame();
            }
          }
        } else {
          if (!gameCleared && gameOver && restartByGamepad) {
            startGame();
          }

          if (!gameOver) {
            updatePlayer();
            updateBullets();
            updateEnemyBullets();
            updateEnemies();
            updateStarsPower();
            updateDoubleShotStars();
            handleCollisions();
            updateExplosions();

            updateBackgroundScroll();
            render3D();
            drawUIHud();
          } else {
            updateExplosions();
            render3D();
            drawGameOverHud();
          }
        }

        lastError = null;
      } catch (e) {
        lastError = e;
        console.error(e);
      }

      requestAnimationFrame(loop);
    }

    function handleResize() {
      layoutCamera();
    }
    window.addEventListener("resize", handleResize);

    loop();
  </script>
